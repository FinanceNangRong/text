<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรายงานเจ้าหนี้</title>
    <!-- Tailwind CSS สำหรับตกแต่งหน้าเว็บ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS สำหรับอ่านไฟล์ Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- PapaParse สำหรับอ่านไฟล์ CSV จาก Google Sheet -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- ฟอนต์ Noto Sans Thai -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Thai', sans-serif;
            background-color: #f3f4f6;
        }
        
        .print-only {
            display: none;
        }

        /* ตั้งค่าสำหรับการพิมพ์ */
        @media print {
            @page {
                size: A4 landscape;
                margin: 10mm;
            }
            body, html {
                background-color: white;
                height: auto !important;
                overflow: visible !important;
                display: block !important;
            }
            /* ยกเลิก overflow/height/flex ของโครงสร้างหลักและกรอบตาราง เพื่อไม่ให้ตารางโดนดันไปหน้า 2 */
            .h-screen, .overflow-hidden, .overflow-auto, .overflow-x-auto, .flex-1, main, #printArea, #contentContainer {
                height: auto !important;
                overflow: visible !important;
                display: block !important;
                position: static !important;
                margin: 0 !important;
                padding: 0 !important;
                page-break-inside: auto !important;
                break-inside: auto !important;
            }
            /* เอาเส้นขอบและเงาของกล่องรอบนอกตารางออกตอนปริ้น */
            .shadow-sm { box-shadow: none !important; }
            .rounded-lg { border-radius: 0 !important; }
            
            /* คลาสป้องกันตารางล้นและตกหน้า */
            .print-fixed-table {
                table-layout: fixed !important;
                width: 100% !important; /* บังคับความกว้างให้ 100% พอดีกระดาษ A4 */
                max-width: 100% !important;
                margin: 0 auto !important;
            }
            .print-fixed-table th, .print-fixed-table td {
                white-space: normal !important;
                word-wrap: break-word !important;
                overflow-wrap: break-word !important; /* บังคับตัดคำขึ้นบรรทัดใหม่ ไม่ให้ดันตารางกว้างเกิน */
                padding: 0.6mm 2px !important; /* ลด padding ซ้ายขวาเพื่อประหยัดพื้นที่ */
            }

            /* คลาสสำหรับบังคับขึ้นหน้าใหม่ตอนพิมพ์ (ใช้กับ tbody จะเสถียรกว่า) */
            tbody.page-break-before {
                page-break-before: always !important;
                break-before: page !important;
            }

            .no-print {
                display: none !important;
            }
            .print-only {
                display: block !important;
            }
            .print-full-width {
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                box-shadow: none !important;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                page-break-inside: auto;
            }
            tr {
                page-break-inside: avoid;
                page-break-after: auto;
            }
            thead {
                display: table-header-group; /* ให้หัวตารางแสดงซ้ำในหน้าถัดไป */
            }
            tfoot {
                display: table-footer-group;
            }
            th, td {
                border: 1px solid #000 !important;
                padding: 0.6mm 2px !important; /* ลดความกว้าง padding ซ้ายขวา */
                height: 0.6mm !important;
                line-height: 1 !important;
                font-size: 7pt !important; /* บังคับขนาด 7 ในตาราง */
            }
            #printArea {
                padding-top: 0;
            }
            th {
                background-color: #f3f4f6 !important; 
                -webkit-print-color-adjust: exact;
                font-weight: bold !important; /* หัวข้อตัวหนา */
            }
            td {
                font-weight: normal !important; /* รายละเอียดตัวบาง */
            }
            /* บังคับล้างคลาสตัวหนาของ Tailwind ออกเฉพาะใน td */
            td.font-medium, td.font-semibold, td.font-bold {
                font-weight: normal !important;
            }
            tfoot td {
                background-color: #f3f4f6 !important;
                -webkit-print-color-adjust: exact;
                font-weight: bold !important; /* ยอดรวมล่างสุดขอเป็นตัวหนา */
            }
            
            /* สไตล์เฉพาะสำหรับหัวรายงานที่ 1 */
            .print-title-report1 {
                font-size: 16pt !important;
                font-weight: bold !important;
                text-align: center;
                margin-bottom: 15px;
            }
            /* จัดหน้ากว้างแบบ Fixed กว้างรวม 275mm สำหรับรายงานที่ 1 (15+120+35+35+35+35) */
            .report1-table-print {
                width: 275mm !important; 
                table-layout: fixed;
                margin: 0 auto; 
            }

            /* จัดการ Checkbox ตอนปริ้น */
            input[type="checkbox"] {
                appearance: none;
                -webkit-appearance: none;
                width: 14px;
                height: 14px;
                border: 1px solid #000;
                display: inline-block;
                position: relative;
            }
            input[type="checkbox"]:checked::after {
                content: '✔';
                position: absolute;
                top: -3px;
                left: 2px;
                font-size: 12px;
            }
        }

        /* ตกแต่ง Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        /* สไตล์เพิ่มเติมสำหรับรายงานที่ 7 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .report7-custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .report7-custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .report7-custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .report7-custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- แถบด้านบน -->
    <header class="bg-blue-800 text-white p-4 shadow-md no-print shrink-0 flex flex-col sm:flex-row justify-between items-center gap-4">
        <h1 class="text-2xl font-bold">ระบบรายงานเจ้าหนี้</h1>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <!-- ช่องซ้าย: ประเภท -->
        <aside class="w-1/4 bg-white border-r border-gray-200 flex flex-col no-print shrink-0 z-10 shadow-[4px_0_10px_rgba(0,0,0,0.05)]">
            <div class="p-4 bg-gray-50 border-b border-gray-200">
                <h2 class="text-lg font-bold text-gray-700">ประเภท</h2>
            </div>
            <nav class="flex-1 overflow-y-auto py-2">
                <ul class="space-y-1 px-2" id="menuList">
                </ul>
            </nav>
        </aside>

        <!-- ช่องขวา: รายการ -->
        <main class="w-3/4 flex-1 bg-white flex flex-col print-full-width relative overflow-hidden">
            <div class="p-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center no-print">
                <h2 class="text-lg font-bold text-gray-700">รายการ</h2>
                <div id="statusBadge" class="text-sm px-3 py-1 rounded-full bg-yellow-100 text-yellow-800 font-medium flex items-center gap-2">
                    <span class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-yellow-500"></span>
                    </span>
                    กำลังโหลดข้อมูล...
                </div>
            </div>
            
            <div class="flex-1 overflow-auto p-6" id="printArea">
                <div id="contentContainer" class="max-w-7xl mx-auto">
                    <div class="text-center text-gray-400 mt-20 no-print">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-4 text-gray-300 animate-spin" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                        <p class="text-lg">กำลังโหลดข้อมูลอัตโนมัติ กรุณารอสักครู่...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- History Modal -->
    <div id="historyModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex justify-center items-center no-print">
        <div class="bg-white rounded-lg shadow-xl w-11/12 max-w-lg overflow-hidden flex flex-col max-h-[80vh]">
            <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                <h3 class="text-lg font-bold text-gray-800">เลือกข้อมูลย้อนหลัง</h3>
                <button onclick="closeHistoryModal()" class="text-gray-500 hover:text-gray-700 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="historyModalContent" class="p-4 overflow-y-auto flex-1">
                <!-- Content will be injected here -->
            </div>
        </div>
    </div>

    <script>
        let appData = []; 
        let activeMenu = 1; 
        
        // ตัวแปรสำหรับรายงานที่ 2
        let selectedCategories_forReport2 = []; 
        let currentAvailableCategories2 = []; 
        let report2DropdownOpen = false;

        let selectedCategoryN_forReport3 = "ทั้งหมด"; 
        let selectedCategoryC_forReport4 = ""; 
        let startDate_forReport5 = "";
        let endDate_forReport5 = "";
        let selectedCategoriesM_forReport5 = []; // เพิ่มตัวแปรสำหรับเก็บรายการ คอลัมน์ M สำหรับรายงานที่ 5
        let selectedCompanies_forReport5 = []; // เพิ่มตัวแปรสำหรับเก็บบริษัทแบบเลือกหลายรายการ รายงานที่ 5
        let currentAvailableCompanies5 = []; // เพิ่มตัวแปรเก็บรายการบริษัทที่แสดงใน Dropdown ปัจจุบัน
        let currentAvailableCategories5 = []; // เพิ่มตัวแปรเก็บรายการค่าที่แสดงใน Dropdown ปัจจุบัน
        let report5DropdownOpen = false; // สถานะการเปิด/ปิด dropdown ของค่า
        let report5CompanyDropdownOpen = false; // สถานะการเปิด/ปิด dropdown ของบริษัท
        
        // ตัวแปรสำหรับรายงานที่ 6
        let appData6 = [];
        let historyList6 = [];
        let selectedHistoryUrl6 = "";
        let isLoadingHistory6 = false;
        let isLoadingData6 = false;

        // ตัวแปรสำหรับรายงานที่ 7
        let selectedCompany_forReport7 = "";
        let selectedStatusFilter_forReport7 = "all";
        let currentFoundRows7 = [];
        let uniqueCompanyNamesList7 = [];
        let isSearched7 = false;

        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT-vY0-Ic04efRHyFptGVLR3UCipBUBhJiFSCWl_3RDAbQP6cUdQaz53D_1Sru3rg/pub?output=csv";
        const HISTORY_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMQ_KJlIyAnZJJYKMjKqKWaM226gI8W00KBx7fUBvUFh6JC5RXNL2Ix28rLR7dZA/pub?output=csv";

        // ฟังก์ชันช่วยสกัด URL ออกจากโค้ด iframe แบบอัตโนมัติ
        function extractUrlFromEmbed(str) {
            let url = String(str).trim();
            if (url.toLowerCase().includes('<iframe') && url.includes('src=')) {
                const match = url.match(/src=["'](.*?)["']/);
                if (match && match[1]) {
                    url = match[1];
                }
            }
            // คืนค่า URL ที่เอา entity &amp; ออกแล้วแปลงเป็น & ปกติ (ถ้ามี)
            return url.replace(/&amp;/g, '&');
        }

        const menus = [
            { id: 1, title: "1. แบบรายงานเจ้าหนี้คงเหลือ" },
            { id: 2, title: "2. รายงานเจ้าหนี้แยกประเภท" },
            { id: 3, title: "3. รายงานเจ้าหนี้ ทวนเจ้าหนี้ หน่วยงาน" },
            { id: 4, title: "4. รายงานเจ้าหนี้ ทวนเจ้าหนี้ บริษัท" },
            { id: 5, title: "5. ทะเบียนคุมส่งทำเช็ค" },
            { id: 6, title: "6. รายงานเจ้าหนี้ย้อนหลัง" },
            { id: 7, title: "7. ค้นหาสถานะบริษัท มีเอกสาร/ดำเนินการ/จ่าย (ประจำเดือน)" }
        ];

        function renderMenu() {
            const menuList = document.getElementById('menuList');
            menuList.innerHTML = '';
            
            menus.forEach(menu => {
                const li = document.createElement('li');
                li.className = `px-4 py-3 rounded-lg cursor-pointer transition-colors text-sm font-medium ${
                    activeMenu === menu.id 
                    ? 'bg-blue-100 text-blue-800 border-l-4 border-blue-600' 
                    : 'text-gray-600 hover:bg-gray-100 border-l-4 border-transparent'
                }`;
                li.textContent = menu.title;
                li.onclick = () => {
                    activeMenu = menu.id;
                    renderMenu();
                    renderContent();
                };
                menuList.appendChild(li);
            });
        }

        function updateStatus(isLoaded) {
            const badge = document.getElementById('statusBadge');
            if(isLoaded) {
                badge.className = "text-sm px-3 py-1 rounded-full bg-green-100 text-green-800 font-medium flex items-center gap-2";
                badge.innerHTML = `
                    <span class="relative flex h-3 w-3">
                      <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                    โหลดข้อมูลสำเร็จ
                `;
            } else {
                badge.className = "text-sm px-3 py-1 rounded-full bg-yellow-100 text-yellow-800 font-medium flex items-center gap-2";
                badge.innerHTML = `
                    <span class="relative flex h-3 w-3">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-3 w-3 bg-yellow-500"></span>
                    </span>
                    กำลังโหลด/ยังไม่มีข้อมูล
                `;
            }
        }

        function fetchGoogleSheetData() {
            updateStatus(false);
            const badge = document.getElementById('statusBadge');
            badge.innerHTML = 'กำลังดึงข้อมูล...';

            Papa.parse(GOOGLE_SHEET_CSV_URL, {
                download: true,
                header: false,
                complete: function(results) {
                    processRawData(results.data);
                },
                error: function(err) {
                    console.error(err);
                    alert("ไม่สามารถดึงข้อมูลจาก Google Sheet ได้");
                    updateStatus(false);
                }
            });
        }

        function openHistoryModal() {
            document.getElementById('historyModal').classList.remove('hidden');
            const content = document.getElementById('historyModalContent');
            content.innerHTML = '<div class="text-center text-gray-500 py-8">กำลังโหลดรายการ...</div>';

            Papa.parse(HISTORY_SHEET_CSV_URL, {
                download: true,
                header: false,
                complete: function(results) {
                    renderHistoryList(results.data);
                },
                error: function(err) {
                    console.error(err);
                    content.innerHTML = '<div class="text-center text-red-500 py-8">ไม่สามารถโหลดรายการได้ กรุณาลองใหม่อีกครั้ง</div>';
                }
            });
        }

        function closeHistoryModal() {
            document.getElementById('historyModal').classList.add('hidden');
        }

        function renderHistoryList(data) {
            const content = document.getElementById('historyModalContent');
            content.innerHTML = '';
            
            // ข้ามแถวที่ 1 (Index 0) ไปเลย แล้วดึงตั้งแต่แถวที่ 2 (Index 1) เป็นต้นไป กรองแถวว่างออก
            const validData = data.slice(1).filter(row => row.length >= 2 && row[0] && String(row[0]).trim() !== '');
            
            if (validData.length === 0) {
                content.innerHTML = '<div class="text-center text-gray-500 py-8">ไม่พบรายการข้อมูลย้อนหลัง</div>';
                return;
            }

            const list = document.createElement('ul');
            list.className = 'space-y-2';

            validData.forEach((row) => {
                const name = String(row[0]).trim(); // คอลัมน์ A
                const url = extractUrlFromEmbed(row[1]);  // คอลัมน์ B (รองรับทั้ง URL ปกติ และ iframe)
                
                // ตรวจสอบว่าเป็น URL หรือไม่ (เผื่อข้อมูลแถวนั้นผิดพลาด)
                if(url.startsWith('http')) {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <button onclick="loadHistoricalData('${url}')" class="w-full text-left px-4 py-3 bg-gray-50 hover:bg-blue-50 border border-gray-200 hover:border-blue-300 rounded-lg transition-colors flex justify-between items-center">
                            <span class="font-medium text-gray-800">${name}</span>
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </button>
                    `;
                    list.appendChild(li);
                }
            });
            content.appendChild(list);
        }

        function loadHistoricalData(url) {
            closeHistoryModal();
            updateStatus(false);
            const badge = document.getElementById('statusBadge');
            badge.innerHTML = 'กำลังดึงข้อมูลย้อนหลัง...';

            // แปลง URL รูปแบบ pubhtml ให้เป็น pub?output=csv เพื่อให้อ่านข้อมูลดิบได้ง่ายเหมือนเดิม
            let fetchUrl = url;
            if(fetchUrl.includes('pubhtml')) {
                fetchUrl = fetchUrl.replace('pubhtml', 'pub').split('?')[0] + '?output=csv';
            }

            Papa.parse(fetchUrl, {
                download: true,
                header: false,
                complete: function(results) {
                    processRawData(results.data);
                },
                error: function(err) {
                    console.error(err);
                    alert("ไม่สามารถดึงข้อมูลย้อนหลังจากลิงก์ที่เลือกได้");
                    updateStatus(false);
                }
            });
        }

        function processRawData(data) {
            if(data.length < 5) {
                alert("ข้อมูลมีน้อยกว่า 5 แถว ไม่สามารถแสดงผลได้ตามเงื่อนไข");
                updateStatus(false);
                return;
            }
            
            appData = data.slice(4); 
            
            appData = appData.filter(row => row.length > 0 && row.some(cell => cell !== "" && cell !== null && cell !== undefined));

            updateStatus(true);
            renderContent();
        }

        function parseNumberValue(val) {
            if (!val) return 0;
            if (typeof val === 'string') {
                val = val.replace(/,/g, '');
            }
            const num = parseFloat(val);
            return isNaN(num) ? 0 : num;
        }

        function formatNumber(num) {
            const val = parseFloat(num);
            if (isNaN(val) || val === 0) return '0.00';
            return val.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // เพิ่มตัวแปรเพื่อรองรับการแสดงผลแบบปีแบบย่อ (เช่น 67 แทน 2567)
        function formatThaiDate(dateVal, shortYear = false) {
            if (dateVal === undefined || dateVal === null || dateVal === '') return '-';
            
            let d, m, y;
            if (typeof dateVal === 'number') {
                const excelEpoch = new Date(Date.UTC(1899, 11, 30));
                const dateObj = new Date(excelEpoch.getTime() + dateVal * 86400000);
                d = dateObj.getUTCDate();
                m = dateObj.getUTCMonth() + 1;
                y = dateObj.getUTCFullYear();
                if (y < 2500) y += 543;
            } else {
                let dateStr = String(dateVal).trim();
                const parts = dateStr.split(/[-/]/);
                if (parts.length === 3) {
                    d = parseInt(parts[0]);
                    m = parseInt(parts[1]);
                    y = parseInt(parts[2]);
                    
                    if (parts[0].length === 4) {
                        y = parseInt(parts[0]);
                        m = parseInt(parts[1]);
                        d = parseInt(parts[2]);
                    }

                    if (!isNaN(d) && !isNaN(m) && !isNaN(y)) {
                         if (y < 100) {
                             if (y >= 50) y += 2500; 
                             else y += 2000;
                         }
                         if (y < 2500) y += 543; 
                    } else {
                        return dateStr;
                    }
                } else {
                    return dateStr;
                }
            }
            
            let yearStr = shortYear ? String(y).slice(-2) : String(y);
            return `${String(d).padStart(2, '0')}/${String(m).padStart(2, '0')}/${yearStr}`;
        }

        // ฟังก์ชันช่วยสำหรับการแปลงวันที่เพื่อใช้เปรียบเทียบ
        function getJSDate(dateVal) {
            if (dateVal === undefined || dateVal === null || dateVal === '') return null;
            if (typeof dateVal === 'number') {
                const excelEpoch = new Date(Date.UTC(1899, 11, 30));
                return new Date(excelEpoch.getTime() + dateVal * 86400000);
            }
            let dateStr = String(dateVal).trim();
            const parts = dateStr.split(/[-/]/);
            if (parts.length === 3) {
                let d = parseInt(parts[0]);
                let m = parseInt(parts[1]) - 1;
                let y = parseInt(parts[2]);
                if (parts[0].length === 4) {
                    y = parseInt(parts[0]);
                    m = parseInt(parts[1]) - 1;
                    d = parseInt(parts[2]);
                }
                if (y < 100) {
                    if (y >= 50) y += 2500;
                    else y += 2000;
                }
                if (y > 2400) y -= 543; // แปลงพ.ศ. กลับเป็น ค.ศ. สำหรับ JS Date object
                return new Date(y, m, d);
            }
            const fallback = new Date(dateStr);
            return isNaN(fallback.getTime()) ? null : fallback;
        }

        function formatHTMLDate(yyyy_mm_dd) {
            if(!yyyy_mm_dd) return '';
            const parts = yyyy_mm_dd.split('-');
            if(parts.length !== 3) return yyyy_mm_dd;
            return `${parts[2]}/${parts[1]}/${parseInt(parts[0])+543}`;
        }

        // ฟังก์ชันแปลงรูปแบบ 03/2026 เป็น มีนาคม 2026
        function getThaiMonthYear(mm_yyyy) {
            if (!mm_yyyy || typeof mm_yyyy !== 'string') return mm_yyyy;
            const parts = mm_yyyy.split('/');
            if (parts.length === 2) {
                const monthIndex = parseInt(parts[0], 10) - 1;
                const year = parts[1];
                const thaiMonths = [
                    "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน",
                    "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"
                ];
                if (monthIndex >= 0 && monthIndex < 12) {
                    return `${thaiMonths[monthIndex]} ${year}`;
                }
            }
            return mm_yyyy; // คืนค่าเดิมหากไม่ตรงรูปแบบ
        }

        function parseDateValueForSort7(dateStr) {
            if (!dateStr || String(dateStr).trim() === '-' || String(dateStr).trim() === '') return Number.MAX_SAFE_INTEGER;
            
            let cleanedStr = String(dateStr).replace(/วัน?(จันทร์|อังคาร|พุธ|พฤหัสบดี|ศุกร์|เสาร์|อาทิตย์)\s*ที่?\s*,?\s*/g, '').trim();
            
            const numMatch = cleanedStr.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
            if (numMatch) {
                let d = parseInt(numMatch[1], 10);
                let m = parseInt(numMatch[2], 10) - 1;
                let y = parseInt(numMatch[3], 10);
                if (y < 100) y += (y > 40) ? 2500 : 2000;
                if (y >= 2500) y -= 543;
                return new Date(y, m, d).getTime();
            }

            const thaiMonthsShort = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
            const thaiMonthsFull = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
            const thaiTextMatch = cleanedStr.match(/(\d{1,2})\s+([ก-๙\.]+)\s+(\d{2,4})/);
            
            if (thaiTextMatch) {
                let d = parseInt(thaiTextMatch[1], 10);
                let monthStr = thaiTextMatch[2];
                let y = parseInt(thaiTextMatch[3], 10);

                let m = thaiMonthsShort.findIndex(tm => monthStr.includes(tm));
                if (m === -1) m = thaiMonthsFull.findIndex(tm => monthStr.includes(tm));
                if (m === -1) m = 0; 

                if (y < 100) y += (y > 40) ? 2500 : 2000;
                if (y >= 2500) y -= 543;
                return new Date(y, m, d).getTime();
            }

            let dateOnly = cleanedStr.split(' ')[0];
            const dObj = new Date(dateOnly);
            if (!isNaN(dObj.getTime())) return dObj.getTime();
            
            return Number.MAX_SAFE_INTEGER;
        }

        function exportToExcel7() {
            let exportData = [];
            
            let headers = [
                "หมวดประเภทรายการ",
                document.getElementById('colDateHeader7').innerText,
                "เลขที่ใบส่งของ",
                "ประเภทการจ่าย",
                "จำนวนเงิน",
                "สถานะ"
            ];
            exportData.push(headers);
            
            let currentCategory = "";
            const rows = document.querySelectorAll("#mainTableBody7 tr");
            rows.forEach(row => {
                let cols = row.querySelectorAll("td");
                if(cols.length === 6) {
                    currentCategory = cols[0].innerText.trim(); 
                    exportData.push([
                        currentCategory,
                        cols[1].innerText.trim(),
                        cols[2].innerText.trim(),
                        cols[3].innerText.trim(),
                        cols[4].innerText.trim(),
                        cols[5].innerText.trim()
                    ]);
                } else if(cols.length === 5) {
                    exportData.push([
                        currentCategory,
                        cols[0].innerText.trim(),
                        cols[1].innerText.trim(),
                        cols[2].innerText.trim(),
                        cols[3].innerText.trim(),
                        cols[4].innerText.trim()
                    ]);
                } else if(cols.length === 1) { 
                    let text = cols[0].innerText.trim();
                    if (!text.includes("ชื่อบริษัท/สาขา:")) {
                        exportData.push([text]);
                    }
                }
            });
            
            let ws = XLSX.utils.aoa_to_sheet(exportData);
            ws['!pageSetup'] = { orientation: 'landscape' };
            let wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data");
            XLSX.writeFile(wb, "Data_Outstanding_Creditors.xlsx");
        }

        function exportToWord7() {
            let header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Export HTML to Word</title><style>@page Section1 {size:841.9pt 595.3pt; mso-page-orientation:landscape; margin:1.0in 1.0in 1.0in 1.0in;} div.Section1 {page:Section1;}</style></head><body><div class='Section1'>";
            let footer = "</div></body></html>";
            
            let html = `<table border="1" cellpadding="5" cellspacing="0" style="border-collapse: collapse; font-family: 'Sarabun', Tahoma, sans-serif; width: 100%; font-size: 14px;">`;
            html += `<tr><th style="background-color: #f1f5f9; text-align: left;">หมวดประเภทรายการ</th><th style="background-color: #f1f5f9; text-align: left;">${document.getElementById('colDateHeader7').innerText}</th><th style="background-color: #f1f5f9; text-align: left;">เลขที่ใบส่งของ</th><th style="background-color: #f1f5f9; text-align: left;">ประเภทการจ่าย</th><th style="background-color: #f1f5f9; text-align: right;">จำนวนเงิน</th><th style="background-color: #f1f5f9; text-align: left;">สถานะ</th></tr>`;
            
            const rows = document.querySelectorAll("#mainTableBody7 tr");
            rows.forEach(row => {
                let cols = row.querySelectorAll("td");
                if(cols.length === 6) {
                    let rowspanAttr = cols[0].getAttribute('rowspan');
                    let rowspanHtml = rowspanAttr ? ` rowspan="${rowspanAttr}"` : '';
                    html += `<tr>
                        <td${rowspanHtml} valign="top">${cols[0].innerText.trim()}</td>
                        <td valign="top">${cols[1].innerText.trim()}</td>
                        <td valign="top">${cols[2].innerText.trim()}</td>
                        <td valign="top">${cols[3].innerText.trim()}</td>
                        <td align="right" valign="top">${cols[4].innerText.trim()}</td>
                        <td valign="top">${cols[5].innerText.trim()}</td>
                    </tr>`;
                } else if(cols.length === 5) {
                    html += `<tr>
                        <td valign="top">${cols[0].innerText.trim()}</td>
                        <td valign="top">${cols[1].innerText.trim()}</td>
                        <td valign="top">${cols[2].innerText.trim()}</td>
                        <td align="right" valign="top">${cols[3].innerText.trim()}</td>
                        <td valign="top">${cols[4].innerText.trim()}</td>
                    </tr>`;
                } else if(cols.length === 1) {
                    let text = cols[0].innerText.trim();
                    if (!text.includes("ชื่อบริษัท/สาขา:")) {
                        html += `<tr><td colspan="6" align="center">${text}</td></tr>`;
                    }
                }
            });
            
            html += `</table>`;
            
            let sourceHTML = header + html + footer;
            let source = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(sourceHTML);
            let fileDownload = document.createElement("a");
            document.body.appendChild(fileDownload);
            fileDownload.href = source;
            fileDownload.download = 'Data_Outstanding_Creditors.doc';
            fileDownload.click();
            document.body.removeChild(fileDownload);
        }

    </script>
