<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียนรับเงิน (QR-Code)</title>
    <!-- ใช้ Tailwind CSS สำหรับจัดรูปแบบ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ใช้ SweetAlert2 สำหรับแจ้งเตือนสวยๆ -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- ใช้ FontAwesome สำหรับไอคอน -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .tab-inactive { color: #6b7280; }
        .tab-inactive:hover { color: #374151; }
        
        /* สไตล์สำหรับการพิมพ์รายงาน */
        @media print {
            body { background-color: white !important; padding: 0 !important; }
            .max-w-5xl { box-shadow: none !important; max-width: 100% !important; margin: 0 !important; border: none !important; }
            
            /* ซ่อนส่วนที่ไม่ต้องการให้โผล่ในกระดาษพิมพ์ */
            #header-banner, #nav-tabs, #report-controls, button { display: none !important; }
            #section-add, #section-view { display: none !important; }
            
            /* ตารางพิมพ์ให้เป็นสีดำชัดๆ และย่อขนาดลง */
            table { border-collapse: collapse; width: 100%; font-size: 11px !important; }
            th, td { border: 1px solid #999 !important; padding: 4px !important; }
            
            /* Override คลาสของ Tailwind ตอนพิมพ์ให้ขนาดเล็กลง */
            .px-4 { padding-left: 4px !important; padding-right: 4px !important; }
            .py-2, .py-3, .py-4 { padding-top: 4px !important; padding-bottom: 4px !important; }
            .text-sm, .text-xs { font-size: 11px !important; line-height: 1.2 !important; }
            .text-lg { font-size: 12px !important; }
            .text-xl { font-size: 14px !important; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <!-- Header -->
        <div id="header-banner" class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold"><i class="fas fa-qrcode mr-2"></i> ระบบลงทะเบียนรับเงิน (QR-Code)</h1>
            <p class="text-blue-100 text-sm mt-1">บันทึกข้อมูลลง Google Sheet</p>
        </div>

        <!-- Navigation Tabs -->
        <div id="nav-tabs" class="flex border-b border-gray-200 px-6 pt-4 overflow-x-auto">
            <button onclick="switchTab('add')" id="tab-add" class="tab-active pb-3 px-4 mr-4 focus:outline-none transition-colors whitespace-nowrap">
                <i class="fas fa-plus-circle mr-1"></i> 1. เพิ่มรายการชั่วคราว
            </button>
            <button onclick="switchTab('view')" id="tab-view" class="tab-inactive pb-3 px-4 mr-4 focus:outline-none transition-colors whitespace-nowrap">
                <i class="fas fa-list mr-1"></i> 2. แสดงรายการ <span id="item-count" class="bg-blue-100 text-blue-800 text-xs font-semibold ml-1 px-2.5 py-0.5 rounded-full">0</span>
            </button>
            <button onclick="switchTab('report')" id="tab-report" class="tab-inactive pb-3 px-4 focus:outline-none transition-colors whitespace-nowrap">
                <i class="fas fa-print mr-1"></i> 3. พิมพ์รายงาน
            </button>
        </div>

        <!-- Content Area -->
        <div class="p-6">
            
            <!-- SECTION 1: เพิ่มรายการชั่วคราว -->
            <div id="section-add">
                <form id="recordForm" onsubmit="handleFormSubmit(event)">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        
                        <div class="col-span-1">
                            <label class="block text-sm font-medium text-gray-700 mb-1">1.1 วันที่ <span class="text-red-500">*</span></label>
                            <input type="date" id="input-date" required class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>

                        <div class="col-span-1">
                            <label class="block text-sm font-medium text-gray-700 mb-1">1.2 เวร <span class="text-red-500">*</span></label>
                            <select id="input-shift" required class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
                                <option value="">-- เลือกเวร --</option>
                                <option value="เวรดึก">เวรดึก</option>
                                <option value="เวรเช้า (อาคารเภสัชกรรม)">เวรเช้า (อาคารเภสัชกรรม)</option>
                                <option value="เวรเช้า (อาคารอำนวยการ)">เวรเช้า (อาคารอำนวยการ)</option>
                                <option value="เวรบ่าย">เวรบ่าย</option>
                                <option value="เวรBD">เวรBD</option>
                                <option value="เวรSMC">เวรSMC</option>
                            </select>
                        </div>

                        <div class="col-span-1 lg:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">1.3 เจ้าหน้าที่ <span class="text-red-500">*</span></label>
                            <select id="input-staff" required class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
                                <option value="">กำลังโหลดรายชื่อ...</option>
                            </select>
                        </div>

                        <div class="col-span-1">
                            <label class="block text-sm font-medium text-gray-700 mb-1">1.4 HN <span class="text-red-500">*</span></label>
                            <input type="text" id="input-hn" required placeholder="รหัสผู้ป่วย" class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>

                        <div class="col-span-1">
                            <label class="block text-sm font-medium text-gray-700 mb-1">1.5 เล่มที่ใบเสร็จ <span class="text-red-500">*</span></label>
                            <input type="text" id="input-bookNo" required placeholder="ระบุเล่มที่" class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>

                        <div class="col-span-1">
                            <label class="block text-sm font-medium text-gray-700 mb-1">1.6 เลขที่ใบเสร็จ <span class="text-red-500">*</span></label>
                            <input type="text" id="input-receiptNo" required placeholder="เช่น 001" maxlength="3" oninput="this.value = this.value.replace(/[^0-9]/g, '')" onblur="if(this.value) this.value = this.value.padStart(3, '0')" class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>

                        <div class="col-span-1">
                            <label class="block text-sm font-medium text-gray-700 mb-1">1.7 TRACE (อ้างอิง QR) <span class="text-red-500">*</span></label>
                            <input type="text" id="input-trace" required placeholder="เลขที่อ้างอิงสลิป" class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>

                        <div class="col-span-1 lg:col-span-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">1.8 จำนวนเงิน (บาท) <span class="text-red-500">*</span></label>
                            <input type="number" step="0.01" id="input-amount" required placeholder="0.00" class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500 text-lg font-bold text-green-600 bg-green-50">
                        </div>
                    </div>

                    <!-- ซ่อนฟิลด์เก็บ index สำหรับกรณีแก้ไข -->
                    <input type="hidden" id="edit-index" value="-1">

                    <div class="mt-6 flex justify-end space-x-3">
                        <button type="button" onclick="resetForm()" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 focus:outline-none">
                            ล้างข้อมูล
                        </button>
                        <button type="submit" id="btn-save" class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none shadow-md font-medium">
                            <i class="fas fa-save mr-1"></i> 1.9 เพิ่มรายการชั่วคราว
                        </button>
                    </div>
                </form>
            </div>

            <!-- SECTION 2: แสดงรายการและส่งข้อมูล -->
            <div id="section-view" class="hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-gray-800">2.1 แสดงรายการชั่วคราว</h2>
                    <div class="text-sm font-medium text-gray-500">ยอดรวม: <span id="total-amount" class="text-green-600 text-lg font-bold">0.00</span> บาท</div>
                </div>

                <div class="overflow-x-auto bg-white border border-gray-200 rounded-lg shadow-sm mb-6">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">#</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">วันที่/เวร</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">HN / เจ้าหน้าที่</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ใบเสร็จ/TRACE</th>
                                <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">จำนวนเงิน</th>
                                <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">2.2 จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="bg-white divide-y divide-gray-200">
                            <!-- Data will be inserted here -->
                            <tr><td colspan="6" class="px-4 py-8 text-center text-gray-400">ยังไม่มีข้อมูลรายการชั่วคราว</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="flex justify-between items-center border-t border-gray-200 pt-4">
                    <button onclick="switchTab('add')" class="text-blue-600 hover:text-blue-800 font-medium">
                        <i class="fas fa-arrow-left mr-1"></i> กลับไปเพิ่มรายการ
                    </button>
                    
                    <button onclick="submitToGoogleSheet()" id="btn-submit-sheet" class="px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 focus:outline-none shadow-lg font-bold text-lg disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-cloud-upload-alt mr-2"></i> 2.3 ยืนยันส่งข้อมูล (<span id="btn-count">0</span> รายการ)
                    </button>
                </div>
            </div>

            <!-- SECTION 3: พิมพ์รายงาน -->
            <div id="section-report" class="hidden">
                <div id="report-controls" class="bg-indigo-50 p-5 rounded-lg border border-indigo-100 mb-6">
                    <h2 class="text-lg font-bold text-indigo-800 mb-4"><i class="fas fa-search mr-2"></i>ค้นหา</h2>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div class="col-span-1">
                            <label class="block text-sm font-medium text-gray-700 mb-1">3.1 เลือกเจ้าหน้าที่</label>
                            <select id="input-report-staff" class="w-full border border-gray-300 rounded-md p-2 focus:ring-indigo-500 focus:border-indigo-500">
                                <option value="ทั้งหมด">-- ทั้งหมด --</option>
                            </select>
                        </div>
                        <div class="col-span-1">
                            <label class="block text-sm font-medium text-gray-700 mb-1">3.2 ตั้งแต่วันที่</label>
                            <input type="date" id="input-report-date-start" class="w-full border border-gray-300 rounded-md p-2 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                        <div class="col-span-1">
                            <label class="block text-sm font-medium text-gray-700 mb-1">ถึงวันที่</label>
                            <input type="date" id="input-report-date-end" class="w-full border border-gray-300 rounded-md p-2 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                        <div class="col-span-1">
                            <label class="block text-sm font-medium text-gray-700 mb-1">3.3 เลือกเวร</label>
                            <select id="input-report-shift" class="w-full border border-gray-300 rounded-md p-2 focus:ring-indigo-500 focus:border-indigo-500">
                                <option value="ทั้งหมด">-- ทั้งหมด --</option>
                                <option value="เวรดึก">เวรดึก</option>
                                <option value="เวรเช้า (อาคารเภสัชกรรม)">เวรเช้า (อาคารเภสัชกรรม)</option>
                                <option value="เวรเช้า (อาคารอำนวยการ)">เวรเช้า (อาคารอำนวยการ)</option>
                                <option value="เวรบ่าย">เวรบ่าย</option>
                                <option value="เวรBD">เวรBD</option>
                                <option value="เวรSMC">เวรSMC</option>
                            </select>
                        </div>
                    </div>
                    <div class="mt-4 flex justify-end space-x-3">
                        <button onclick="fetchReportData()" class="px-6 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 focus:outline-none shadow-md font-medium">
                            <i class="fas fa-search mr-1"></i> ค้นหาข้อมูล
                        </button>
                        <button onclick="printReport()" id="btn-print" disabled class="px-6 py-2 bg-gray-400 text-white rounded-md focus:outline-none shadow-md font-medium cursor-not-allowed">
                            <i class="fas fa-print mr-1"></i> 3.4 พิมพ์รายงาน
                        </button>
                    </div>
                </div>

                <!-- ส่วนแสดงผลตารางรายงาน -->
                <div id="report-results" class="hidden">
                    <div class="overflow-x-auto bg-white border border-gray-200 rounded-lg shadow-sm">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-100">
                                <tr>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">#</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">วันที่</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">TRACE</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">HN</th>
                                    <th class="px-4 py-3 text-left text-xs font-medium text-gray-600 uppercase tracking-wider">เล่มที่ / เลขที่ใบเสร็จ</th>
                                    <th class="px-4 py-3 text-right text-xs font-medium text-gray-600 uppercase tracking-wider">จำนวนเงิน (บาท)</th>
                                </tr>
                            </thead>
                            <tbody id="report-table-body" class="bg-white divide-y divide-gray-200">
                                <!-- ข้อมูลรายงานจะแสดงที่นี่ -->
                            </tbody>
                            <tfoot class="bg-gray-50 border-t border-gray-300">
                                <tr>
                                    <td colspan="5" class="px-4 py-4 text-right font-bold text-gray-800 text-lg">รวมเป็นเงินทั้งสิ้น :</td>
                                    <td class="px-4 py-4 text-right font-bold text-green-700 text-xl" id="report-total-amount">0.00</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- ส่วนที่ 1: การตั้งค่า (Configuration) ---
        const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw-GtWNhLNGTJBOb5rYTqb53bhYhG7BYsPD9fsm0TfjQ00mNX3bBu_0JY7-b8lz6zcp/exec"; 
        
        // --- ส่วนที่ 2: ตัวแปรเก็บข้อมูล (State) ---
        let temporaryRecords = [];
        let staffPositionsMap = {}; // เพิ่มตัวแปรเก็บข้อมูลตำแหน่ง

        // ตั้งค่าวันที่เริ่มต้นให้เป็นวันนี้
        const today = new Date();
        document.getElementById('input-date').valueAsDate = today;
        document.getElementById('input-report-date-start').valueAsDate = today;
        document.getElementById('input-report-date-end').valueAsDate = today;

        // โหลดรายชื่อเจ้าหน้าที่เมื่อเปิดหน้าเว็บ
        window.addEventListener('DOMContentLoaded', fetchStaffList);

        async function fetchStaffList() {
            const staffSelect = document.getElementById('input-staff');
            const reportStaffSelect = document.getElementById('input-report-staff');
            
            try {
                const response = await fetch(GOOGLE_WEB_APP_URL + "?action=getStaff");
                const result = await response.json();
                
                if(result.status === 'success') {
                    staffSelect.innerHTML = '<option value="">-- เลือกเจ้าหน้าที่ --</option>';
                    reportStaffSelect.innerHTML = '<option value="ทั้งหมด">-- ทั้งหมด --</option>';
                    
                    result.staff.forEach(item => {
                        // รองรับการดึงข้อมูลแบบใหม่ที่มีตำแหน่งพ่วงมาด้วย
                        const name = typeof item === 'object' ? item.name : item;
                        const position = typeof item === 'object' ? item.position : '';

                        if(name.toString().trim() !== '') {
                            // เก็บข้อมูลตำแหน่งคู่กับชื่อ
                            staffPositionsMap[name] = position;

                            // ใส่ในหน้าเพิ่มรายการ
                            const option = document.createElement('option');
                            option.value = name;
                            option.innerText = name;
                            staffSelect.appendChild(option);

                            // ใส่ในหน้าพิมพ์รายงาน
                            const optionReport = document.createElement('option');
                            optionReport.value = name;
                            optionReport.innerText = name;
                            reportStaffSelect.appendChild(optionReport);
                        }
                    });
                }
            } catch (error) {
                console.error("Fetch staff error:", error);
                staffSelect.innerHTML = '<option value="">เกิดข้อผิดพลาดในการโหลดรายชื่อ</option>';
            }
        }

        // --- ส่วนที่ 3: ฟังก์ชันการทำงาน (Functions) ---

        // สลับแท็บ (Tab Switching)
        function switchTab(tabName) {
            const tabs = ['add', 'view', 'report'];
            
            tabs.forEach(tab => {
                const tabBtn = document.getElementById(`tab-${tab}`);
                const section = document.getElementById(`section-${tab}`);
                
                if (tab === tabName) {
                    tabBtn.className = 'tab-active pb-3 px-4 mr-4 focus:outline-none transition-colors whitespace-nowrap';
                    section.classList.remove('hidden');
                } else {
                    tabBtn.className = 'tab-inactive pb-3 px-4 mr-4 focus:outline-none transition-colors whitespace-nowrap';
                    section.classList.add('hidden');
                }
            });
            
            if (tabName === 'view') {
                renderTable();
            }
        }

        // รับข้อมูลจากฟอร์มและบันทึกลง Array
        function handleFormSubmit(event) {
            event.preventDefault(); 
            
            // บังคับให้เลขใบเสร็จเป็น 3 หลักก่อนบันทึกเสมอ
            let receiptNoVal = document.getElementById('input-receiptNo').value;
            if (receiptNoVal && !isNaN(receiptNoVal)) {
                receiptNoVal = String(receiptNoVal).padStart(3, '0');
            }

            const record = {
                date: document.getElementById('input-date').value,
                shift: document.getElementById('input-shift').value,
                staff: document.getElementById('input-staff').value,
                hn: document.getElementById('input-hn').value,
                bookNo: document.getElementById('input-bookNo').value,
                receiptNo: receiptNoVal,
                trace: document.getElementById('input-trace').value,
                amount: parseFloat(document.getElementById('input-amount').value)
            };

            const editIndex = parseInt(document.getElementById('edit-index').value);

            if (editIndex === -1) {
                temporaryRecords.push(record);
                Swal.fire({ icon: 'success', title: 'เพิ่มรายการสำเร็จ', timer: 1000, showConfirmButton: false });
            } else {
                temporaryRecords[editIndex] = record;
                document.getElementById('edit-index').value = "-1"; 
                document.getElementById('btn-save').innerHTML = '<i class="fas fa-save mr-1"></i> 1.9 เพิ่มรายการชั่วคราว';
                document.getElementById('btn-save').classList.replace('bg-orange-600', 'bg-blue-600');
                document.getElementById('btn-save').classList.replace('hover:bg-orange-700', 'hover:bg-blue-700');
                Swal.fire({ icon: 'success', title: 'แก้ไขสำเร็จ', timer: 1000, showConfirmButton: false });
            }

            updateCounters();
            resetForm();
            switchTab('view');
        }

        // ล้างฟอร์ม
        function resetForm() {
            const currentDate = document.getElementById('input-date').value;
            const currentStaff = document.getElementById('input-staff').value;
            const currentShift = document.getElementById('input-shift').value;
            
            document.getElementById('recordForm').reset();
            
            document.getElementById('input-date').value = currentDate;
            document.getElementById('input-staff').value = currentStaff;
            document.getElementById('input-shift').value = currentShift;
            
            document.getElementById('edit-index').value = "-1";
            document.getElementById('btn-save').innerHTML = '<i class="fas fa-save mr-1"></i> 1.9 เพิ่มรายการชั่วคราว';
            document.getElementById('btn-save').classList.replace('bg-orange-600', 'bg-blue-600');
            document.getElementById('btn-save').classList.replace('hover:bg-orange-700', 'hover:bg-blue-700');
        }

        // วาดตารางหน้า 2
        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            let total = 0;

            if (temporaryRecords.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-gray-500 font-medium">ยังไม่มีข้อมูลในรายการชั่วคราว</td></tr>';
                document.getElementById('btn-submit-sheet').disabled = true;
            } else {
                document.getElementById('btn-submit-sheet').disabled = false;
                temporaryRecords.forEach((item, index) => {
                    total += item.amount;
                    const dateObj = new Date(item.date);
                    const formattedDate = dateObj.toLocaleDateString('th-TH');

                    // จัดรูปแบบให้เลขใบเสร็จเป็น 3 หลักตอนแสดงผล
                    let displayReceiptNo = item.receiptNo;
                    if(displayReceiptNo && !isNaN(displayReceiptNo) && displayReceiptNo !== '-') {
                        displayReceiptNo = String(displayReceiptNo).padStart(3, '0');
                    }

                    const row = document.createElement('tr');
                    row.className = "hover:bg-blue-50 transition-colors";
                    row.innerHTML = `
                        <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-500">${index + 1}</td>
                        <td class="px-4 py-3 whitespace-nowrap">
                            <div class="text-sm font-medium text-gray-900">${formattedDate}</div>
                            <div class="text-xs text-gray-500">${item.shift}</div>
                        </td>
                        <td class="px-4 py-3 whitespace-nowrap">
                            <div class="text-sm font-bold text-blue-600">HN: ${item.hn}</div>
                            <div class="text-xs text-gray-500"><i class="fas fa-user-md text-gray-400"></i> ${item.staff}</div>
                        </td>
                        <td class="px-4 py-3 whitespace-nowrap">
                            <div class="text-sm text-gray-900">เล่ม: ${item.bookNo} | เลข: ${displayReceiptNo}</div>
                            <div class="text-xs text-gray-500">Trace: ${item.trace}</div>
                        </td>
                        <td class="px-4 py-3 whitespace-nowrap text-right text-sm font-bold text-green-600">
                            ${item.amount.toLocaleString('en-US', {minimumFractionDigits: 2})}
                        </td>
                        <td class="px-4 py-3 whitespace-nowrap text-center text-sm font-medium">
                            <button onclick="editItem(${index})" class="text-orange-500 hover:text-orange-700 mx-1 p-1 bg-orange-50 rounded" title="แก้ไข">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteItem(${index})" class="text-red-500 hover:text-red-700 mx-1 p-1 bg-red-50 rounded" title="ลบ">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }
            document.getElementById('total-amount').innerText = total.toLocaleString('en-US', {minimumFractionDigits: 2});
        }

        // หน้า 2 แก้ไข
        function editItem(index) {
            const item = temporaryRecords[index];
            document.getElementById('input-date').value = item.date;
            document.getElementById('input-shift').value = item.shift;
            document.getElementById('input-staff').value = item.staff;
            document.getElementById('input-hn').value = item.hn;
            document.getElementById('input-bookNo').value = item.bookNo;
            document.getElementById('input-receiptNo').value = item.receiptNo;
            document.getElementById('input-trace').value = item.trace;
            document.getElementById('input-amount').value = item.amount;
            
            document.getElementById('edit-index').value = index;
            const btnSave = document.getElementById('btn-save');
            btnSave.innerHTML = `<i class="fas fa-check-circle mr-1"></i> ยืนยันการแก้ไขรายการที่ ${index + 1}`;
            btnSave.classList.replace('bg-blue-600', 'bg-orange-600');
            btnSave.classList.replace('hover:bg-blue-700', 'hover:bg-orange-700');
            switchTab('add');
        }

        // หน้า 2 ลบ
        function deleteItem(index) {
            Swal.fire({
                title: 'ยืนยันการลบ?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'ใช่, ลบเลย!',
                cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) {
                    temporaryRecords.splice(index, 1);
                    updateCounters();
                    renderTable();
                }
            });
        }

        function updateCounters() {
            const count = temporaryRecords.length;
            document.getElementById('item-count').innerText = count;
            document.getElementById('btn-count').innerText = count;
            if (count > 0) {
                document.getElementById('item-count').classList.replace('bg-blue-100', 'bg-red-500');
                document.getElementById('item-count').classList.replace('text-blue-800', 'text-white');
            } else {
                document.getElementById('item-count').classList.replace('bg-red-500', 'bg-blue-100');
                document.getElementById('item-count').classList.replace('text-white', 'text-blue-800');
            }
        }

        // ส่งข้อมูลเข้า Sheet
        async function submitToGoogleSheet() {
            if (temporaryRecords.length === 0) return;

            Swal.fire({
                title: 'กำลังส่งข้อมูล...',
                html: 'โปรดรอสักครู่ ระบบกำลังบันทึกลง Google Sheet',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading() }
            });

            try {
                await fetch(GOOGLE_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(temporaryRecords)
                });

                Swal.fire({
                    icon: 'success',
                    title: 'บันทึกข้อมูลสำเร็จ!',
                    text: `ส่งข้อมูลจำนวน ${temporaryRecords.length} รายการ ลง Sheet เรียบร้อยแล้ว`,
                    confirmButtonColor: '#3085d6',
                });

                temporaryRecords = [];
                updateCounters();
                renderTable();
                switchTab('add');

            } catch (error) {
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถส่งข้อมูลได้ กรุณาตรวจสอบอินเทอร์เน็ต', 'error');
            }
        }

        // --- ส่วนที่ 4: ฟังก์ชันการดึงรายงานและพิมพ์ (ใหม่) ---
        
        async function fetchReportData() {
            const staff = document.getElementById('input-report-staff').value;
            const startDate = document.getElementById('input-report-date-start').value;
            const endDate = document.getElementById('input-report-date-end').value;
            const shift = document.getElementById('input-report-shift').value;

            if (!startDate || !endDate) {
                Swal.fire('แจ้งเตือน', 'กรุณาระบุช่วงวันที่ให้ครบถ้วน', 'warning');
                return;
            }

            if(startDate > endDate) {
                Swal.fire('แจ้งเตือน', 'วันที่เริ่มต้น ต้องน้อยกว่าหรือเท่ากับวันที่สิ้นสุด', 'warning');
                return;
            }

            Swal.fire({
                title: 'กำลังดึงข้อมูลรายงาน...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading() }
            });

            try {
                // เรียกใช้ action=getReport พร้อมแนบเงื่อนไข
                const url = `${GOOGLE_WEB_APP_URL}?action=getReport&staff=${encodeURIComponent(staff)}&startDate=${startDate}&endDate=${endDate}`;
                const response = await fetch(url);
                const result = await response.json();

                if(result.status === 'success') {
                    // กรองข้อมูล "เวร" ในฝั่ง Frontend เพื่อไม่ต้องแก้ Apps Script
                    let filteredData = result.data;
                    if (shift !== "ทั้งหมด") {
                        filteredData = filteredData.filter(item => item.shift === shift);
                    }
                    renderReportResults(filteredData);
                    Swal.close();
                } else {
                    Swal.fire('ผิดพลาด', 'ไม่สามารถดึงข้อมูลได้: ' + result.message, 'error');
                }
            } catch (error) {
                console.error("Report fetch error:", error);
                Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อกับฐานข้อมูลได้ โปรดอัปเดต Apps Script', 'error');
            }
        }

        function renderReportResults(data) {
            const tbody = document.getElementById('report-table-body');
            const resultsDiv = document.getElementById('report-results');
            const btnPrint = document.getElementById('btn-print');
            
            tbody.innerHTML = '';
            let total = 0;

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-gray-500 font-medium">ไม่พบข้อมูลในเงื่อนไขที่เลือก</td></tr>';
                btnPrint.disabled = true;
                btnPrint.classList.replace('bg-gray-800', 'bg-gray-400');
                btnPrint.classList.replace('hover:bg-gray-900', 'cursor-not-allowed');
            } else {
                // เรียงลำดับข้อมูล (Sort): เล่มที่ ขึ้นก่อน แล้วตามด้วย เลขที่ใบเสร็จ
                data.sort((a, b) => {
                    let bookA = (a.bookNo || '').toString();
                    let bookB = (b.bookNo || '').toString();
                    if (bookA !== bookB) {
                        return bookA.localeCompare(bookB, 'th', {numeric: true});
                    }
                    let receiptA = (a.receiptNo || '').toString();
                    let receiptB = (b.receiptNo || '').toString();
                    return receiptA.localeCompare(receiptB, 'th', {numeric: true});
                });

                data.forEach((item, index) => {
                    const amount = parseFloat(item.amount) || 0;
                    total += amount;

                    // จัดการรูปแบบวันที่
                    let dateStr = item.date;
                    const dateObj = new Date(item.date);
                    if(!isNaN(dateObj)) {
                        dateStr = dateObj.toLocaleDateString('th-TH');
                    }

                    // จัดรูปแบบให้เลขใบเสร็จเป็น 3 หลักตอนแสดงผลในรายงาน (รวมถึงข้อมูลเก่าที่มาจาก Sheet)
                    let displayReceiptNo = item.receiptNo;
                    if(displayReceiptNo && !isNaN(displayReceiptNo) && displayReceiptNo !== '-') {
                        displayReceiptNo = String(displayReceiptNo).padStart(3, '0');
                    }

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td class="px-4 py-2 whitespace-nowrap text-sm text-gray-600">${index + 1}</td>
                        <td class="px-4 py-2 whitespace-nowrap">
                            <div class="text-sm text-gray-900">${dateStr}</div>
                        </td>
                        <td class="px-4 py-2 whitespace-nowrap">
                            <div class="text-sm text-gray-800">${item.trace || '-'}</div>
                        </td>
                        <td class="px-4 py-2 whitespace-nowrap">
                            <div class="text-sm font-bold text-gray-800">${item.hn || '-'}</div>
                        </td>
                        <td class="px-4 py-2 whitespace-nowrap">
                            <div class="text-sm text-gray-800">${item.bookNo || '-'} / ${displayReceiptNo || '-'}</div>
                        </td>
                        <td class="px-4 py-2 whitespace-nowrap text-right text-sm font-bold text-green-700">
                            ${amount.toLocaleString('en-US', {minimumFractionDigits: 2})}
                        </td>
                    `;
                    tbody.appendChild(row);
                });
                
                btnPrint.disabled = false;
                btnPrint.classList.replace('bg-gray-400', 'bg-gray-800');
                btnPrint.classList.replace('cursor-not-allowed', 'hover:bg-gray-900');
            }

            document.getElementById('report-total-amount').innerText = total.toLocaleString('en-US', {minimumFractionDigits: 2});
            resultsDiv.classList.remove('hidden');
        }

        function printReport() {
            // สร้างหัวรายงานชั่วคราวสำหรับตอนพิมพ์
            const printHeader = document.createElement('div');
            printHeader.id = 'print-header-temp';
            printHeader.className = 'text-center mb-4';
            
            const staff = document.getElementById('input-report-staff').value;
            const startDateStr = new Date(document.getElementById('input-report-date-start').value).toLocaleDateString('th-TH');
            const endDateStr = new Date(document.getElementById('input-report-date-end').value).toLocaleDateString('th-TH');
            const shift = document.getElementById('input-report-shift').value;
            
            // ดึงตำแหน่งจาก Map ที่เก็บไว้ (ถ้าเลือก "ทั้งหมด" ให้เป็น "-")
            const position = staff !== "ทั้งหมด" ? (staffPositionsMap[staff] || '-') : '-';
            
            printHeader.innerHTML = `
                <p style="font-size: 12px; margin-bottom: 8px; color: #000; line-height: 1.6;">
                    <strong>เจ้าหน้าที่:</strong> ${staff} &nbsp;&nbsp;<strong>ตำแหน่ง:</strong> ${position} <br>
                    <strong>เวร:</strong> ${shift} &nbsp;&nbsp;<strong>ประจำวันที่:</strong> ${startDateStr} ถึง ${endDateStr}
                </p>
            `;
            
            const resultsDiv = document.getElementById('report-results');
            resultsDiv.parentNode.insertBefore(printHeader, resultsDiv);
            
            // สั่งพิมพ์ (เบราว์เซอร์จะดึง CSS @media print ที่เขียนไว้ด้านบนมาใช้ซ่อนปุ่มต่างๆ)
            window.print();
            
            // ลบหัวรายงานออกหลังพิมพ์เสร็จ
            printHeader.remove();
        }

    </script>
</body>
</html>
