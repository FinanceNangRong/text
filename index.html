    <style>
        html {
            font-size: 90%; /* ลดขนาดหน้าเว็บโดยรวมลง 10% (กระทบกับขนาดของโครงสร้างทั้งหมด) */
        }
        body {
            font-family: 'Noto Sans Thai', sans-serif;
            background-color: #f3f4f6;
        }
        
        .print-only {
            display: none;
        }

        /* ตั้งค่าสำหรับการพิมพ์ */
        @media print {
            @page {
                size: A4 landscape;
                margin: 10mm;
            }
            body, html {
                background-color: white;
                height: auto !important;
                overflow: visible !important;
                display: block !important;
            }
            /* ยกเลิก overflow/height/flex ของโครงสร้างหลักและกรอบตาราง เพื่อไม่ให้ตารางโดนดันไปหน้า 2 */
            .h-screen, .overflow-hidden, .overflow-auto, .overflow-x-auto, .flex-1, main, #printArea, #contentContainer {
                height: auto !important;
                overflow: visible !important;
                display: block !important;
                position: static !important;
                margin: 0 !important;
                padding: 0 !important;
                page-break-inside: auto !important;
                break-inside: auto !important;
            }
            /* เอาเส้นขอบและเงาของกล่องรอบนอกตารางออกตอนปริ้น */
            .shadow-sm { box-shadow: none !important; }
            .rounded-lg { border-radius: 0 !important; }
            
            /* คลาสป้องกันตารางล้นและตกหน้า */
            .print-fixed-table {
                table-layout: fixed !important;
                width: 100% !important; /* บังคับความกว้างให้ 100% พอดีกระดาษ A4 */
                max-width: 100% !important;
                margin: 0 auto !important;
            }
            .print-fixed-table th, .print-fixed-table td {
                white-space: normal !important;
                word-wrap: break-word !important;
                overflow-wrap: break-word !important; /* บังคับตัดคำขึ้นบรรทัดใหม่ ไม่ให้ดันตารางกว้างเกิน */
                padding: 0.6mm 2px !important; /* ลด padding ซ้ายขวาเพื่อประหยัดพื้นที่ */
            }

            /* เพิ่มคลาสสำหรับตัดข้อความให้เป็นบรรทัดเดียว (ทั้งบนหน้าจอและตอนปริ้น) */
            .print-fixed-table td.print-truncate,
            .print-truncate {
                white-space: nowrap !important;
                overflow: hidden !important;
                text-overflow: ellipsis !important;
                word-wrap: normal !important;
                overflow-wrap: normal !important;
            }

            /* คลาสสำหรับบังคับขึ้นหน้าใหม่ตอนพิมพ์ (ใช้กับ tbody จะเสถียรกว่า) */
            tbody.page-break-before {
                page-break-before: always !important;
                break-before: page !important;
            }

            .no-print {
                display: none !important;
            }
            .print-only {
                display: block !important;
            }
            .print-full-width {
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                box-shadow: none !important;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                page-break-inside: auto;
            }
            tr {
                page-break-inside: avoid;
                page-break-after: auto;
            }
            thead {
                display: table-header-group; /* ให้หัวตารางแสดงซ้ำในหน้าถัดไป */
            }
            tfoot {
                display: table-footer-group;
            }
            th, td {
                border: 1px solid #000 !important;
                padding: 0.5mm 2px !important; /* ลดความกว้าง padding ซ้ายขวา */
                height: 0.5mm !important;
                line-height: 1 !important;
                font-size: 6.5pt !important; /* บังคับขนาดเล็กลง 10% จาก 7pt */
            }
            #printArea {
                padding-top: 0;
            }
            th {
                background-color: #f3f4f6 !important; 
                -webkit-print-color-adjust: exact;
                font-weight: bold !important; /* หัวข้อตัวหนา */
            }
            td {
                font-weight: normal !important; /* รายละเอียดตัวบาง */
            }
            /* บังคับล้างคลาสตัวหนาของ Tailwind ออกเฉพาะใน td */
            td.font-medium, td.font-semibold, td.font-bold {
                font-weight: normal !important;
            }
            tfoot td {
                background-color: #f3f4f6 !important;
                -webkit-print-color-adjust: exact;
                font-weight: bold !important; /* ยอดรวมล่างสุดขอเป็นตัวหนา */

            /* สไตล์เฉพาะสำหรับหัวรายงานที่ 1 */
            .print-title-report1 {

                font-weight: bold !important;

            /* จัดหน้ากว้างแบบ Fixed กว้างรวม 251mm สำหรับรายงานที่ 1 และ 6 (15+96+35+35+35+35) */
            .report1-table-print {
                width: 251mm !important; 
                table-layout: fixed;
                margin: 0 auto;

            /* จัดการ Checkbox ตอนปริ้น */
            input[type="checkbox"] {
                appearance: none;
                -webkit-appearance: none;
                width: 14px;
                height: 14px;
                border: 1px solid #000;
                display: inline-block;
                position: relative;
            }
            input[type="checkbox"]:checked::after {
                content: '✔';
                position: absolute;
                top: -3px;
                left: 2px;
                font-size: 12px;
            }
        }

        /* ตกแต่ง Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;

        ::-webkit-scrollbar-thumb {

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('hidden')) {

                sidebar.classList.add('flex');
            } else {

        // ฟังก์ชันช่วยสกัด URL ออกจากโค้ด iframe แบบอัตโนมัติ
        function extractUrlFromEmbed(str) {
            let url = String(str).trim();
            if (url.toLowerCase().includes('<iframe') && url.includes('src=')) {
                const match = url.match(/src=["'](.*?)["']/);
                if (match && match[1]) {
                    url = match[1];
                }
            }
            // คืนค่า URL ที่เอา entity &amp; ออกแล้วแปลงเป็น & ปกติ (ถ้ามี)
            return url.replace(/&amp;/g, '&');
        }

        function renderMenu() {
            const menuList = document.getElementById('menuList');
            menuList.innerHTML = '';
            
            menus.forEach(menu => {
                const li = document.createElement('li');
                li.className = `px-4 py-3 rounded-lg cursor-pointer transition-colors text-sm font-medium ${

                    ? 'bg-blue-100 text-blue-800 border-l-4 border-blue-600' 
                    : 'text-gray-600 hover:bg-gray-100 border-l-4 border-transparent'
                }`;
                li.textContent = menu.title;
                li.onclick = () => {
                    activeMenu = menu.id;
                    renderMenu();
                    renderContent();
                };
                menuList.appendChild(li);
            });
        }

        // เพิ่มฟังก์ชันสำหรับประมวลผลข้อมูลเตรียมไว้ล่วงหน้า (Pre-processing) เพื่อลดภาระการคำนวณซ้ำในลูป
        function enrichData(rows) {
            return rows.map(row => {
                // ตัวเลข
                row._e = parseNumberValue(row[4]);
                row._f = parseNumberValue(row[5]);
                row._g = parseNumberValue(row[6]);
                row._h = parseNumberValue(row[7]);

                // ข้อความ
                row._compC = String(row[2] || '').trim();
                row._compCSearch = row._compC.toLowerCase().replace(/\s+/g, ''); // สำหรับค้นหา
                row._invD = row[3] || '-';
                
                let valM = String(row[12] || '').trim();
                row._valM = valM === '' ? 'ไม่ระบุหมวดหมู่' : valM;
                
                row._dept = String(row[13] || '').trim();
                row._status = String(row[22] || '').trim();
                row._taxId = String(row[21] || '').trim();

                // วันที่แบบ Timestamp (สำหรับเรียงลำดับและกรอง)
                row._dateRecTs = parseDateForFilter(row[1]);
                row._datePayTs = parseDateForFilter(row[8]);

        function parseNumberValue(val) {
            if (!val) return 0;
            if (typeof val === 'string') {
                val = val.replace(/,/g, '');
            }
            const num = parseFloat(val);
            return isNaN(num) ? 0 : num;
        }

        function formatNumber(num) {
            const val = parseFloat(num);
            if (isNaN(val) || val === 0) return '0.00';
            return val.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // เพิ่มตัวแปรเพื่อรองรับการแสดงผลแบบปีแบบย่อ (เช่น 67 แทน 2567)
        function formatThaiDate(dateVal, shortYear = false) {
            if (dateVal === undefined || dateVal === null || dateVal === '') return '-';
            
            let d, m, y;
            if (typeof dateVal === 'number') {
                const excelEpoch = new Date(Date.UTC(1899, 11, 30));
                const dateObj = new Date(excelEpoch.getTime() + dateVal * 86400000);
                d = dateObj.getUTCDate();
                m = dateObj.getUTCMonth() + 1;
                y = dateObj.getUTCFullYear();
                if (y < 2500) y += 543;
            } else {
                let dateStr = String(dateVal).trim();
                const parts = dateStr.split(/[-/]/);
                if (parts.length === 3) {
                    d = parseInt(parts[0]);
                    m = parseInt(parts[1]);
                    y = parseInt(parts[2]);
                    
                    if (parts[0].length === 4) {
                        y = parseInt(parts[0]);
                        m = parseInt(parts[1]);
                        d = parseInt(parts[2]);
                    }

                    if (!isNaN(d) && !isNaN(m) && !isNaN(y)) {
                         if (y < 100) {
                             if (y >= 50) y += 2500; 
                             else y += 2000;
                         }
                         if (y < 2500) y += 543; 
                    } else {
                        return dateStr;
                    }
                } else {
                    return dateStr;
                }
            }
            
            let yearStr = shortYear ? String(y).slice(-2) : String(y);
            return `${String(d).padStart(2, '0')}/${String(m).padStart(2, '0')}/${yearStr}`;
        }

        // ฟังก์ชันช่วยสำหรับการแปลงวันที่เพื่อใช้เปรียบเทียบ
        function getJSDate(dateVal) {
            if (dateVal === undefined || dateVal === null || dateVal === '') return null;
            if (typeof dateVal === 'number') {
                const excelEpoch = new Date(Date.UTC(1899, 11, 30));
                return new Date(excelEpoch.getTime() + dateVal * 86400000);
            }
            let dateStr = String(dateVal).trim();
            const parts = dateStr.split(/[-/]/);
            if (parts.length === 3) {
                let d = parseInt(parts[0]);
                let m = parseInt(parts[1]) - 1;
                let y = parseInt(parts[2]);
                if (parts[0].length === 4) {
                    y = parseInt(parts[0]);
                    m = parseInt(parts[1]) - 1;
                    d = parseInt(parts[2]);
                }
                if (y < 100) {
                    if (y >= 50) y += 2500;
                    else y += 2000;
                }
                if (y > 2400) y -= 543; // แปลงพ.ศ. กลับเป็น ค.ศ. สำหรับ JS Date object
                return new Date(y, m, d);
            }
            const fallback = new Date(dateStr);
            return isNaN(fallback.getTime()) ? null : fallback;
        }

        // ฟังก์ชันอ่านวันที่แบบยืดหยุ่นสำหรับกรองข้อมูล (รองรับทั้ง ค.ศ. พ.ศ. ข้อความไทย และเลข Excel)
        const parseDateForFilter = (str) => {
            if (!str || String(str).trim() === '-' || String(str).trim() === '') return null;
            let cStr = String(str).trim();
            
            const parts = cStr.split(/[\/\-]/);
            if (parts.length === 3) {
                let d = parseInt(parts[0], 10);
                let m = parseInt(parts[1], 10) - 1;
                let y = parseInt(parts[2], 10);
                if (parts[0].length === 4) { y = parseInt(parts[0], 10); m = parseInt(parts[1], 10) - 1; d = parseInt(parts[2], 10); }
                if (y < 100) y += (y > 40) ? 2500 : 2000;
                if (y >= 2400) y -= 543;
                let dObj = new Date(y, m, d);
                if (!isNaN(dObj.getTime())) return dObj.getTime();
            }

            const thaiMonthsShort = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
            const thaiMonthsFull = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
            const thaiTextMatch = cStr.match(/(\d{1,2})\s+([ก-๙\.]+)\s+(\d{2,4})/);
            if (thaiTextMatch) {
                let d = parseInt(thaiTextMatch[1], 10);
                let monthStr = thaiTextMatch[2];
                let y = parseInt(thaiTextMatch[3], 10);
                let m = thaiMonthsShort.findIndex(tm => monthStr.includes(tm));
                if (m === -1) m = thaiMonthsFull.findIndex(tm => monthStr.includes(tm));
                if (m === -1) m = 0; 
                if (y < 100) y += (y > 40) ? 2500 : 2000;
                if (y >= 2400) y -= 543;
                return new Date(y, m, d).getTime();
            }
            
            // Handle Excel serial date if it's a number string
            if (!isNaN(cStr) && Number(cStr) > 10000) {
                 const excelEpoch = new Date(Date.UTC(1899, 11, 30));
                 return excelEpoch.getTime() + Number(cStr) * 86400000;
            }
            
            let dObj = new Date(cStr);
            if (!isNaN(dObj.getTime())) return dObj.getTime();
            
            return null;
        };

        function formatHTMLDate(yyyy_mm_dd) {
            if(!yyyy_mm_dd) return '';
            const parts = yyyy_mm_dd.split('-');
            if(parts.length !== 3) return yyyy_mm_dd;
            return `${parts[2]}/${parts[1]}/${parseInt(parts[0])+543}`;
        }

        // ฟังก์ชันแปลงรูปแบบ 03/2026 เป็น มีนาคม 2026
        function getThaiMonthYear(mm_yyyy) {
            if (!mm_yyyy || typeof mm_yyyy !== 'string') return mm_yyyy;
            const parts = mm_yyyy.split('/');
            if (parts.length === 2) {
                const monthIndex = parseInt(parts[0], 10) - 1;
                const year = parts[1];
                const thaiMonths = [
                    "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน",
                    "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"
                ];
                if (monthIndex >= 0 && monthIndex < 12) {
                    return `${thaiMonths[monthIndex]} ${year}`;
                }
            }
            return mm_yyyy; // คืนค่าเดิมหากไม่ตรงรูปแบบ
        }

        // เพิ่มฟังก์ชันสำหรับแปลงวันที่เป็นรูปแบบสั้น เช่น "10 มี.ค. 26" (ปี ค.ศ.)
        function formatThaiDateShort(dateVal) {
            if (dateVal === undefined || dateVal === null || dateVal === '') return '-';
            const jsDate = getJSDate(dateVal);
            if (!jsDate) return String(dateVal);
            
            const thaiMonthsShort = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
            const d = jsDate.getDate();
            const m = jsDate.getMonth();
            const y = jsDate.getFullYear(); // ใช้ ค.ศ.
            
            return `${d} ${thaiMonthsShort[m]} ${String(y).slice(-2)}`;
        }

        // ฟังก์ชันคำนวณปีงบประมาณจาก Timestamp
        function getFiscalYear(dateTs) {
            if (!dateTs) return null;
            const d = new Date(dateTs);
            let y = d.getFullYear(); 
            // เดือนใน JS เริ่มที่ 0 (ม.ค.) ถึง 11 (ธ.ค.)
            // ปีงบประมาณไทย เริ่ม 1 ต.ค. (เดือน 9)
            if (d.getMonth() >= 9) y += 1; 
            return String(y + 543);
        }

        function filterDropdownOptions(containerId, searchText) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const labels = container.getElementsByTagName('label');
            const filter = searchText.toLowerCase().replace(/\s+/g, '');
            for (let i = 0; i < labels.length; i++) {
                const span = labels[i].querySelector('span');
                if (span) {
                    const textValue = (span.textContent || span.innerText).toLowerCase().replace(/\s+/g, '');
                    if (textValue.indexOf(filter) > -1) {
                        labels[i].style.display = "";
                    } else {
                        labels[i].style.display = "none";
                    }
                }
            }
        }

            } else if (activeMenu === 4 || activeMenu === 14) {

                container.innerHTML = `

            if (activeMenu === 1) {
                renderReport1(container);
            } else if (activeMenu === 2) {
                renderReport2(container);
            } else if (activeMenu === 3) {
                renderReport11(container);
            } else if (activeMenu === 4) {
                renderReport12(container);
            } else if (activeMenu === 5) {
                renderReport3(container);
            } else if (activeMenu === 6) {
                renderReport4(container);
            } else if (activeMenu === 7) {
                renderReport5(container);
            } else if (activeMenu === 8) {
                renderReport6(container);
            } else if (activeMenu === 9) {
                renderReport7_History(container);
            } else if (activeMenu === 10) {
                renderReport7(container);
            } else if (activeMenu === 11) {
                renderReport8(container);
            } else if (activeMenu === 12) {
                renderReport10(container);
            } else if (activeMenu === 13) {
                renderReport13(container);
            } else if (activeMenu === 14) {
                renderReport14(container);
            } else {
                renderPlaceholder(container);

        }

        // ==========================================
        // รายงานที่ 1: แบบรายงานเจ้าหนี้คงเหลือ
        // ==========================================
        function renderReport1(container) {
            const groupedData = {};
            
            appData.forEach(row => {
                let valM = row._valM;
                
                if (valM === 'ไม่ระบุหมวดหมู่') {
                     if(row._e === 0 && row._f === 0 && row._g === 0 && row._h === 0) return;
                }

                if (!groupedData[valM]) {
                    groupedData[valM] = { E: 0, F: 0, G: 0, H: 0 };
                }

                groupedData[valM].E += row._e;
                groupedData[valM].F += row._f;
                groupedData[valM].G += row._g;
                groupedData[valM].H += row._h;

            let headerHTML = `

            let tableHTML = `

            } else {
                keys.forEach(key => {

                    sumE += data.E; sumF += data.F; sumG += data.G; sumH += data.H;

                    tableHTML += `
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="px-4 py-2 text-center text-gray-500">${index++}</td>
                            <td class="px-4 py-2 text-gray-800 font-medium truncate print-truncate" style="max-width: 96mm;" title="${key}">${key}</td>

                            <td class="px-4 py-2 text-right text-gray-800">${formatNumber(data.F)}</td>
                            <td class="px-4 py-2 text-right text-gray-800">${formatNumber(data.G)}</td>
                            <td class="px-4 py-2 text-right text-blue-700 font-semibold">${formatNumber(data.H)}</td>
                        </tr>
                    `;
                });

                tableHTML += `
                        </tbody>
                        <tfoot class="bg-gray-100 border-t-2 border-gray-300 font-bold">
                            <tr>
                                <td colspan="2" class="px-4 py-3 text-center text-gray-800">รวมทั้งสิ้น</td>

                                <td class="px-4 py-3 text-right text-blue-800">${formatNumber(sumH)}</td>
                            </tr>
                        </tfoot>
                `;
            }

            tableHTML += `
                    </table>
                </div>
            `;

            container.innerHTML = headerHTML + tableHTML;
        }

        // ==========================================
        // รายงานที่ 2: รายงานเจ้าหนี้แยกประเภท (แบบใหม่ จัดกลุ่มตามหมวดหมู่)
        // ==========================================
        function renderReport2(container) {
            // 1. ดึงหมวดหมู่ทั้งหมดที่มีข้อมูล (เพื่อใช้กับ Dropdown โดยไม่อิงวันที่กรอง)
            const uniqueCategoriesSet = new Set();
            appData.forEach(row => {
                if (row._e === 0 && row._f === 0 && row._g === 0 && row._h === 0) return;
                uniqueCategoriesSet.add(row._valM);
            });
            const uniqueCategories = [...uniqueCategoriesSet].sort();
            currentAvailableCategories2 = uniqueCategories;

            // ตรวจสอบการตั้งค่าเริ่มต้น (กำหนดให้เริ่มต้นแบบยังไม่เลือกรายการใดเลย)
            if (typeof window.report2Initialized === 'undefined') {
                selectedCategories_forReport2 = [];
                window.report2Initialized = true;
            }

            // 2. กรองข้อมูลตามเงื่อนไข (หมวดหมู่ และ วันที่)
            let filteredData2 = appData.filter(row => {
                if (row._e === 0 && row._f === 0 && row._g === 0 && row._h === 0) return false;

                // กรองหมวดหมู่ (ถ้าไม่ได้เลือก จะไม่แสดงข้อมูล)
                if (selectedCategories_forReport2.length === 0) return false;
                if (!selectedCategories_forReport2.includes(row._valM)) return false;

                // กรองวันที่
                if (startDate_receive_forReport2) {
                    const sDate = new Date(startDate_receive_forReport2);
                    sDate.setHours(0,0,0,0);
                    if (!row._dateRecTs || row._dateRecTs < sDate.getTime()) return false;
                }
                if (endDate_receive_forReport2) {
                    const eDate = new Date(endDate_receive_forReport2);
                    eDate.setHours(23,59,59,999);
                    if (!row._dateRecTs || row._dateRecTs > eDate.getTime()) return false;
                }

                if (startDate_pay_forReport2) {
                    const sDate = new Date(startDate_pay_forReport2);
                    sDate.setHours(0,0,0,0);
                    if (!row._datePayTs || row._datePayTs < sDate.getTime()) return false;
                }
                if (endDate_pay_forReport2) {
                    const eDate = new Date(endDate_pay_forReport2);
                    eDate.setHours(23,59,59,999);
                    if (!row._datePayTs || row._datePayTs > eDate.getTime()) return false;
                }

                return true;
            });

            // 3. จัดกลุ่มข้อมูลตามหมวดหมู่
            const groupedData = {};
            filteredData2.forEach(row => {
                if (!groupedData[row._valM]) groupedData[row._valM] = [];
                groupedData[row._valM].push(row);
            });

            // 4. สร้าง Header UI พร้อม Dropdown และ ตัวกรองวันที่
            let headerHTML = `
                <div class="flex flex-col justify-between items-start mb-6 gap-4 no-print">
                    <div class="w-full flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                        <div class="flex-1 w-full">
                            <h3 class="text-2xl font-bold text-gray-800 mb-3">รายงานเจ้าหนี้แยกประเภท</h3>
                            
                            <!-- กล่องตัวกรอง -->
                            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 shadow-sm space-y-4">
                                <!-- หมวดหมู่ -->
                                <div class="flex flex-col sm:flex-row items-start sm:items-center gap-3">
                                    <label class="text-gray-700 font-medium min-w-[120px]">เลือกค่า (หมวดหมู่):</label>
                                    <div class="relative inline-block text-left w-full sm:w-auto">
                                        <button type="button" id="catDropdownBtn2" onclick="toggleReport2Dropdown()" class="border border-gray-300 rounded-lg px-4 py-2 bg-white text-gray-800 shadow-sm flex items-center justify-between w-full sm:w-80 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                            <span class="truncate">${selectedCategories_forReport2.length > 0 ? selectedCategories_forReport2.join(', ') : '-- กรุณาเลือกหมวดหมู่ --'}</span>
                                            <svg class="-mr-1 ml-2 h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                                                <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                                            </svg>
                                        </button>
                                        <div id="catDropdown2" class="${report2DropdownOpen ? '' : 'hidden'} origin-top-right absolute left-0 mt-2 w-full sm:w-80 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 z-20">
                                            <div class="sticky top-0 z-10 bg-white rounded-t-md shadow-sm">
                                                <div class="px-3 py-2 border-b border-gray-200 flex justify-between bg-gray-50 rounded-t-md">
                                                    <button type="button" onclick="selectAllCategories2()" class="text-xs font-semibold text-blue-600 hover:text-blue-800 focus:outline-none">เลือกทั้งหมด</button>

                                                </div>
                                                <div class="p-2 border-b border-gray-200">
                                                    <input type="text" placeholder="พิมพ์ค้นหาค่า (หมวดหมู่)..." oninput="filterDropdownOptions('catListContainer2', this.value)" class="w-full border border-gray-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:border-blue-500" autocomplete="off">
                                                </div>
                                            </div>
                                            <div id="catListContainer2" class="py-1 max-h-48 overflow-y-auto px-3" role="menu" aria-orientation="vertical">
                                                ${uniqueCategories.length > 0 ? uniqueCategories.map(cat => `
                                                    <label class="flex items-center py-2 cursor-pointer hover:bg-gray-50 border-b border-gray-100 last:border-0">
                                                        <input type="checkbox" value="${cat}" 
                                                               ${selectedCategories_forReport2.includes(cat) ? 'checked' : ''}
                                                               onchange="updateReport2CategoryFilter(this.value, this.checked)"
                                                               class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 mr-3">
                                                        <span class="text-sm text-gray-700">${cat}</span>
                                                    </label>
                                                `).join('') : '<div class="py-2 text-sm text-gray-500">ไม่พบหมวดหมู่</div>'}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <hr class="border-gray-200">
                                
                                <!-- ตัวกรองวันที่ -->
                                <div class="flex flex-col lg:flex-row gap-4 lg:items-center">
                                    <!-- วันที่ตรวจรับ -->
                                    <div class="flex flex-col sm:flex-row items-start sm:items-center gap-2 flex-1">

                                        <input type="date" value="${startDate_receive_forReport2}" onchange="updateReport2Dates('receive_start', this.value)" class="border border-gray-300 rounded px-2 py-1.5 focus:outline-none focus:border-blue-500 w-full sm:w-auto text-sm">

                                        <input type="date" value="${endDate_receive_forReport2}" onchange="updateReport2Dates('receive_end', this.value)" class="border border-gray-300 rounded px-2 py-1.5 focus:outline-none focus:border-blue-500 w-full sm:w-auto text-sm">
                                    </div>
                                    
                                    <div class="hidden lg:block w-px h-8 bg-gray-300 mx-2"></div>
                                    
                                    <!-- วันที่ชำระ -->

                                        <label class="text-gray-700 font-medium min-w-[120px] text-sm">วันที่ชำระ (ตั้งแต่):</label>
                                        <input type="date" value="${startDate_pay_forReport2}" onchange="updateReport2Dates('pay_start', this.value)" class="border border-gray-300 rounded px-2 py-1.5 focus:outline-none focus:border-blue-500 w-full sm:w-auto text-sm">
                                        <label class="text-gray-700 font-medium mx-1 text-sm">ถึง:</label>
                                        <input type="date" value="${endDate_pay_forReport2}" onchange="updateReport2Dates('pay_end', this.value)" class="border border-gray-300 rounded px-2 py-1.5 focus:outline-none focus:border-blue-500 w-full sm:w-auto text-sm">
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <button onclick="window.print()" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded shadow flex items-center gap-2 transition-colors shrink-0 h-fit mt-4 md:mt-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                            </svg>
                            พิมพ์รายงาน
                        </button>
                    </div>
                </div>
                
                <h3 class="text-xl font-bold text-center mb-4 print-only">รายงานเจ้าหนี้แยกประเภท</h3>
            `;

            let tableHTML = `
                <div class="overflow-x-auto bg-white rounded-lg border border-gray-200 shadow-sm">
                    <table class="min-w-full text-sm text-left whitespace-nowrap print-fixed-table">
                        <thead class="bg-blue-50 text-blue-900 border-b border-gray-200">
                            <tr>
                                <th class="px-4 py-3 font-semibold text-center w-12">ลำดับ</th>
                                <th class="px-4 py-3 font-semibold text-center">วันที่ตรวจรับ</th>
                                <th class="px-4 py-3 font-semibold text-center" style="width: 50mm; min-width: 50mm; max-width: 50mm;">บริษัท/หจก/ร้าน</th>
                                <th class="px-4 py-3 font-semibold text-center max-w-[200px]">ใบส่งของ/แจ้งหนี้</th>
                                <th class="px-4 py-3 font-semibold text-center" style="width: 20mm; min-width: 20mm;">จำนวนเงิน</th>
                                <th class="px-4 py-3 font-semibold text-center" style="width: 20mm; min-width: 20mm;">จ่าย</th>
                                <th class="px-4 py-3 font-semibold text-center" style="width: 20mm; min-width: 20mm;">ปรับปรุง</th>
                                <th class="px-4 py-3 font-semibold text-center" style="width: 20mm; min-width: 20mm;">คงเหลือ</th>
                                <th class="px-4 py-3 font-semibold text-center" style="width: 20mm; min-width: 20mm;">วันที่ชำระ</th>
                            </tr>
                        </thead>
            `;

            let sumGrandE = 0, sumGrandF = 0, sumGrandG = 0, sumGrandH = 0;
            const keys = Object.keys(groupedData).sort();

            if (keys.length === 0) {
                tableHTML += `<tbody class="divide-y divide-gray-100"><tr><td colspan="9" class="px-4 py-8 text-center text-gray-500">ไม่พบข้อมูลตามเงื่อนไขที่เลือก</td></tr></tbody>`;

                    groupRows.forEach(row => {

                        sumGrandE += row._e; sumGrandF += row._f; sumGrandG += row._g; sumGrandH += row._h;

                        tableHTML += `

        function renderReport14(container) {
            if (historyList14.length === 0 && !isLoadingHistory14) {
                isLoadingHistory14 = true;
                container.innerHTML = '<div class="text-center text-gray-500 py-8">กำลังดึงข้อมูลรายชื่อย้อนหลัง...</div>';
                Papa.parse(HISTORY_SHEET_CSV_URL, {
                    download: true,
                    header: false,
                    complete: function(results) {
                        isLoadingHistory14 = false;
                        const validData = results.data.slice(1).filter(row => row.length >= 2 && row[0] && String(row[0]).trim() !== '');
                        historyList14 = validData.map(row => ({
                            name: String(row[0]).trim(),
                            url: extractUrlFromEmbed(row[1])
                        })).filter(item => item.url.startsWith('http'));
                        renderReport14(container);
                    },
                    error: function(err) {
                        isLoadingHistory14 = false;
                        container.innerHTML = '<div class="text-center text-red-500 py-8">ไม่สามารถโหลดรายการได้</div>';
                    }
                });
                return;
            }

            let headerDropdownHTML = `
                <div class="flex flex-col mb-6 gap-4 no-print">
                    <h3 class="text-2xl font-bold text-gray-800">14. รายงานแยกประเภท ประจำปีงบประมาณ ย้อนหลัง แบบแสดงรายเดือน</h3>
                    <div class="bg-white p-4 rounded-lg border border-gray-200 shadow-sm w-full flex flex-col sm:flex-row items-start sm:items-center gap-3">
                        <label class="text-gray-700 font-medium whitespace-nowrap">เลือกเดือน:</label>
                        <select onchange="handleHistorySelect14(this.value)" class="border border-gray-300 rounded-lg px-4 py-2 bg-white text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm w-full sm:w-80 cursor-pointer">
                            <option value="">-- กรุณาเลือกข้อมูลย้อนหลัง --</option>
                            ${historyList14.map(h => `<option value="${h.url}" ${selectedHistoryUrl14 === h.url ? 'selected' : ''}>${h.name}</option>`).join('')}
                        </select>
                    </div>
                </div>
            `;

            let contentHTML = '';

            if (isLoadingData14) {
                contentHTML = '<div class="text-center text-blue-500 py-8">กำลังโหลดข้อมูลรายงาน...</div>';
            } else if (appData14.length > 0) {
                const selectedItem = historyList14.find(h => h.url === selectedHistoryUrl14);
                const selectedName = selectedItem ? selectedItem.name : "";
                const formattedDate = getThaiMonthYear(selectedName);
                
                const uniqueCategoriesSet = new Set();
                const uniqueFYsSet = new Set();
                
                appData14.forEach(row => {
                    if (row._e === 0 && row._f === 0 && row._g === 0 && row._h === 0) return;
                    uniqueCategoriesSet.add(row._valM);
                    const fy = getFiscalYear(row._dateRecTs);
                    if (fy) uniqueFYsSet.add(fy);
                });
                
                const uniqueCategories = [...uniqueCategoriesSet].sort();
                currentAvailableCategories14 = uniqueCategories;
                const uniqueFYs = [...uniqueFYsSet].sort((a, b) => Number(b) - Number(a));

                if (!window.report14Initialized) {
                    selectedCategories_forReport14 = [];
                    selectedFiscalYear_forReport14 = uniqueFYs.length > 0 ? uniqueFYs[0] : "";
                    window.report14Initialized = true;
                }

                let filteredData14 = appData14.filter(row => {
                    if (row._e === 0 && row._f === 0 && row._g === 0 && row._h === 0) return false;
                    if (selectedCategories_forReport14.length === 0) return false;
                    if (!selectedCategories_forReport14.includes(row._valM)) return false;
                    if (selectedFiscalYear_forReport14) {
                        const rowFy = getFiscalYear(row._dateRecTs);
                        if (rowFy !== selectedFiscalYear_forReport14) return false;
                    }
                    return true;
                });

                const pivotData = {};
                const fiscalMonths = [
                    { m: 9, label: 'ต.ค.' }, { m: 10, label: 'พ.ย.' }, { m: 11, label: 'ธ.ค.' },
                    { m: 0, label: 'ม.ค.' }, { m: 1, label: 'ก.พ.' }, { m: 2, label: 'มี.ค.' },
                    { m: 3, label: 'เม.ย.' }, { m: 4, label: 'พ.ค.' }, { m: 5, label: 'มิ.ย.' },
                    { m: 6, label: 'ก.ค.' }, { m: 7, label: 'ส.ค.' }, { m: 8, label: 'ก.ย.' }
                ];

                let totalCols = { total: 0 };
                fiscalMonths.forEach(fm => totalCols[fm.m] = 0);

                filteredData14.forEach(row => {
                    const cat = row._valM;
                    if (!pivotData[cat]) {
                        pivotData[cat] = { total: 0 };
                        fiscalMonths.forEach(fm => pivotData[cat][fm.m] = 0);
                    }

                    if (row._dateRecTs) {
                        const d = new Date(row._dateRecTs);
                        const monthStr = d.getMonth(); 
                        const valToSum = row._e; 

                        if (pivotData[cat][monthStr] !== undefined) {
                            pivotData[cat][monthStr] += valToSum;
                            pivotData[cat].total += valToSum;
                            totalCols[monthStr] += valToSum;
                            totalCols.total += valToSum;
                        }
                    }
                });

                let printTitle = `รายงานแยกประเภท แบบสรุปรายเดือน ย้อนหลัง (ข้อมูลเดือน ${formattedDate})`;
                if (selectedFiscalYear_forReport14) printTitle += ` ประจำปีงบประมาณ ${selectedFiscalYear_forReport14}`;

                let monthHeaders = '';
                fiscalMonths.forEach(fm => {
                    let yearLabel = "";
                    if (selectedFiscalYear_forReport14) {
                        let fy = parseInt(selectedFiscalYear_forReport14);
                        if (fm.m >= 9) {
                            yearLabel = ` ${(fy - 1).toString().slice(-2)}`;
                        } else {
                            yearLabel = ` ${fy.toString().slice(-2)}`;
                        }
                    }
                    monthHeaders += `<th class="px-2 py-3 font-semibold text-center border border-gray-300 w-[95px] min-w-[95px] whitespace-nowrap bg-blue-100 print:static print:bg-blue-50">${fm.label}${yearLabel}</th>`;
                });

                let controlHTML = `
                    <div class="flex flex-col justify-between items-start mb-6 gap-4 no-print border-t border-gray-200 pt-6">
                        <div class="w-full flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                            <div class="flex-1 w-full">
                                <h4 class="text-xl font-bold text-gray-700 mb-3">14.1 แบบรายงานแยกประเภท แบบแสดงรายเดือน เดือนเก่า</h4>
                                
                                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 shadow-sm space-y-4">
                                    <div class="flex flex-col sm:flex-row gap-6">
                                        <div class="flex flex-col items-start gap-2">
                                            <label class="text-gray-700 font-medium whitespace-nowrap">ปีงบประมาณ:</label>
                                            <select onchange="changeFiscalYear14(this.value)" class="border border-gray-300 rounded-lg px-4 py-2 bg-white text-gray-800 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-full sm:w-48 cursor-pointer font-medium">
                                                <option value="">-- แสดงทุกปีงบประมาณ --</option>
                                                ${uniqueFYs.map(fy => `<option value="${fy}" ${selectedFiscalYear_forReport14 === fy ? 'selected' : ''}>${fy}</option>`).join('')}
                                            </select>
                                        </div>

                                        <div class="hidden sm:block w-px bg-gray-300 self-stretch"></div>

                                        <div class="flex flex-col items-start gap-2 flex-1">
                                            <label class="text-gray-700 font-medium">เลือกค่า (หมวดหมู่):</label>
                                            <div class="relative text-left w-full sm:w-80">
                                                <button type="button" id="catDropdownBtn14" onclick="toggleReport14Dropdown()" class="border border-gray-300 rounded-lg px-4 py-2 bg-white text-gray-800 shadow-sm flex items-center justify-between w-full focus:outline-none focus:ring-2 focus:ring-blue-500">
                                                    <span class="truncate">${selectedCategories_forReport14.length > 0 ? selectedCategories_forReport14.join(', ') : '-- กรุณาเลือกหมวดหมู่ --'}</span>
                                                    <svg class="-mr-1 ml-2 h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                                                        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                                                    </svg>
                                                </button>
                                                <div id="catDropdown14" class="${report14DropdownOpen ? '' : 'hidden'} origin-top-left absolute left-0 mt-2 w-full sm:w-96 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 z-20">
                                                    <div class="sticky top-0 z-10 bg-white rounded-t-md shadow-sm">
                                                        <div class="px-3 py-2 border-b border-gray-200 flex justify-between bg-gray-50 rounded-t-md">
                                                            <button type="button" onclick="selectAllCategories14()" class="text-xs font-semibold text-blue-600 hover:text-blue-800 focus:outline-none">เลือกทั้งหมด</button>
                                                            <button type="button" onclick="clearAllCategories14()" class="text-xs font-semibold text-red-600 hover:text-red-800 focus:outline-none">ล้าง</button>
                                                        </div>
                                                        <div class="p-2 border-b border-gray-200">
                                                            <input type="text" placeholder="พิมพ์ค้นหาค่า (หมวดหมู่)..." oninput="filterDropdownOptions('catListContainer14', this.value)" class="w-full border border-gray-300 rounded px-2 py-1.5 text-sm focus:outline-none focus:border-blue-500" autocomplete="off">
                                                        </div>
                                                    </div>
                                                    <div id="catListContainer14" class="py-1 max-h-48 overflow-y-auto px-3" role="menu">
                                                        ${uniqueCategories.length > 0 ? uniqueCategories.map(cat => `
                                                            <label class="flex items-center py-2 cursor-pointer hover:bg-gray-50 border-b border-gray-100 last:border-0">
                                                                <input type="checkbox" value="${cat}" 
                                                                       ${selectedCategories_forReport14.includes(cat) ? 'checked' : ''}
                                                                       onchange="updateReport14CategoryFilter(this.value, this.checked)"
                                                                       class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 mr-3">
                                                                <span class="text-sm text-gray-700">${cat}</span>
                                                            </label>
                                                        `).join('') : '<div class="py-2 text-sm text-gray-500">ไม่พบหมวดหมู่</div>'}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        <div class="flex items-end mb-2 sm:mb-0 ml-auto">
                                            <p class="text-sm text-gray-500 italic"><span class="font-bold text-gray-700">* แสดงยอดตั้งหนี้ (จำนวนเงินรวม)</span></p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <button onclick="window.print()" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded shadow flex items-center gap-2 transition-colors shrink-0 h-fit mt-4 md:mt-0">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                                พิมพ์รายงาน
                            </button>
                        </div>
                    </div>
                    <h3 class="text-xl font-bold text-center mb-4 print-only">${printTitle}</h3>
                `;

                let tableHTML = `
                    <div class="overflow-x-auto bg-white rounded-lg border border-gray-200 shadow-sm animate-[fadeIn_0.4s_ease-out] report7-custom-scrollbar" style="max-height: 70vh;">
                        <table class="min-w-full text-sm text-left border-collapse print-fixed-table" style="table-layout: auto;">
                            <thead class="bg-blue-100 text-blue-900 border-b-2 border-gray-300">
                                <tr>
                                    <th class="px-3 py-3 font-semibold text-center border border-gray-300 w-[47px] min-w-[47px] sticky left-0 z-20 bg-blue-100 print:static print:bg-blue-50">ลำดับ</th>
                                    <th class="px-4 py-3 font-semibold text-center border border-gray-300 w-[200px] min-w-[200px] max-w-[200px] sticky left-[47px] z-20 bg-blue-100 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] print:static print:shadow-none print:bg-blue-50">ค่า</th>
                                    ${monthHeaders}
                                    <th class="px-3 py-3 font-bold text-center border border-gray-300 w-[114px] min-w-[114px] bg-blue-200 print:static print:bg-blue-100">รวมทั้งสิ้น</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200 bg-white">
                `;

                const catKeys = Object.keys(pivotData).sort();

                if (catKeys.length === 0) {
                    tableHTML += `<tr><td colspan="15" class="px-4 py-8 text-center text-gray-500">ไม่พบข้อมูลตามเงื่อนไขที่เลือก หรือยังไม่ได้เลือกหมวดหมู่</td></tr></tbody>`;
                } else {
                    let index = 1;
                    catKeys.forEach(catKey => {
                        const rowData = pivotData[catKey];
                        
                        tableHTML += `
                            <tr class="group hover:bg-gray-50 transition-colors">
                                <td class="px-3 py-2 text-center text-gray-500 border border-gray-200 sticky left-0 z-10 bg-white group-hover:bg-gray-50 print:static">${index++}</td>
                                <td class="px-4 py-2 text-gray-800 font-medium border border-gray-200 sticky left-[47px] z-10 bg-white shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)] group-hover:bg-gray-50 print:static print:shadow-none truncate print-truncate w-[200px] max-w-[200px]" title="${catKey}">${catKey}</td>
                        `;
                        
                        fiscalMonths.forEach(fm => {
                            const val = rowData[fm.m];
                            const displayVal = val !== 0 ? formatNumber(val) : '';
                            tableHTML += `<td class="px-2 py-2 text-right text-gray-700 border border-gray-200 align-middle w-[95px] min-w-[95px]">${displayVal}</td>`;
                        });
                        
                        tableHTML += `
                                <td class="px-2 py-2 text-right text-blue-700 font-bold border border-gray-200 bg-blue-50/30 align-middle print:bg-transparent w-[114px] min-w-[114px]">${formatNumber(rowData.total)}</td>
                            </tr>
                        `;
                    });

                    tableHTML += `
                            </tbody>
                            <tfoot class="bg-gray-100 border-t-4 border-gray-300 font-bold text-gray-900 sticky bottom-0 z-20">
                                <tr>
                                    <td colspan="2" class="px-4 py-3 text-right border border-gray-300 sticky left-0 z-20 bg-gray-100 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] print:static print:shadow-none">รวมยอดทั้งสิ้น</td>
                    `;

                    fiscalMonths.forEach(fm => {
                        const val = totalCols[fm.m];
                        const displayVal = val !== 0 ? formatNumber(val) : '-';
                        tableHTML += `<td class="px-2 py-3 text-right border border-gray-300 align-middle bg-gray-100 w-[95px] min-w-[95px]">${displayVal}</td>`;
                    });

                    tableHTML += `
                                    <td class="px-2 py-3 text-right text-blue-900 border border-gray-300 bg-gray-200 align-middle print:bg-transparent w-[114px] min-w-[114px]">${formatNumber(totalCols.total)}</td>
                                </tr>
                            </tfoot>
                    `;
                }

                tableHTML += `</table></div>`;
                contentHTML += controlHTML + tableHTML;

            } else if (selectedHistoryUrl14 !== "") {
                contentHTML = '<div class="text-center text-gray-500 py-8">ไม่พบข้อมูล หรือข้อมูลไม่ถูกต้อง</div>';
            } else {
                contentHTML = `
                    <div class="text-center text-gray-400 mt-10 no-print border-t border-gray-200 pt-10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-4 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                        <p class="text-lg">กรุณาเลือกข้อมูลย้อนหลังจากดรอปดาวน์ด้านบน</p>
                    </div>
                `;
            }

            container.innerHTML = headerDropdownHTML + contentHTML;
        }

        function renderPlaceholder(container) {
            container.innerHTML = `
                <div class="text-center text-gray-500 mt-20 no-print">
                    <h3 class="text-2xl font-bold mb-4">ระบบกำลังพัฒนา</h3>
                    <p>กรุณาเลือกเมนูอื่น</p>
                </div>
            `;
        }

        function updateStatus(isSuccess) {
            const statusBadge = document.getElementById('statusBadge');
            if (!statusBadge) return;
            
            if (isSuccess) {
                statusBadge.className = "text-sm px-3 py-1 rounded-full bg-emerald-100 text-emerald-800 font-medium flex items-center gap-2";
                statusBadge.innerHTML = `
                    <span class="relative flex h-3 w-3">
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                    </span>
                    ข้อมูลพร้อมใช้งาน
                `;
            } else {
                statusBadge.className = "text-sm px-3 py-1 rounded-full bg-red-100 text-red-800 font-medium flex items-center gap-2";
                statusBadge.innerHTML = `
                    <span class="relative flex h-3 w-3">
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                    </span>
                    โหลดข้อมูลล้มเหลว
                `;
            }
        }

        function fetchGoogleSheetData() {
            Papa.parse(GOOGLE_SHEET_CSV_URL, {
                download: true,
                header: false,
                complete: function(results) {
                    processRawData(results.data);
                },
                error: function(err) {
                    console.error("Error fetching data:", err);
                    updateStatus(false);
                    alert("ไม่สามารถดึงข้อมูลจาก Google Sheet ได้ โปรดตรวจสอบการเชื่อมต่ออินเทอร์เน็ต");
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderMenu();
            fetchGoogleSheetData();
        });

    </script>
</body>
