<!DOCTYPE html>
<html lang="th">
<head>

    <title>ระบบรายงานเจ้าหนี้</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS สำหรับอ่านไฟล์ Excel -->

    <!-- ฟอนต์ Noto Sans Thai -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Thai', sans-serif;
            background-color: #f3f4f6;
        }
        
        .print-only {
            display: none;
        }

        /* ตั้งค่าสำหรับการพิมพ์ */
        @media print {
            @page {
                size: A4 landscape;
                margin: 10mm;
            }
            body, html {
                background-color: white;
                height: auto !important;
                overflow: visible !important;
                display: block !important;
            }
            /* ยกเลิก overflow/height/flex ของโครงสร้างหลักและกรอบตาราง เพื่อไม่ให้ตารางโดนดันไปหน้า 2 */
            .h-screen, .overflow-hidden, .overflow-auto, .overflow-x-auto, .flex-1, main, #printArea, #contentContainer {
                height: auto !important;
                overflow: visible !important;
                display: block !important;
                position: static !important;
                margin: 0 !important;
                padding: 0 !important;
                page-break-inside: auto !important;
                break-inside: auto !important;
            }
            /* เอาเส้นขอบและเงาของกล่องรอบนอกตารางออกตอนปริ้น */
            .shadow-sm { box-shadow: none !important; }
            .rounded-lg { border-radius: 0 !important; }
            
            /* คลาสป้องกันตารางล้นและตกหน้า */
            .print-fixed-table {
                table-layout: fixed !important;
                width: 100% !important; /* บังคับความกว้างให้ 100% พอดีกระดาษ A4 */
                max-width: 100% !important;
                margin: 0 auto !important;
            }
            .print-fixed-table th, .print-fixed-table td {
                white-space: normal !important;
                word-wrap: break-word !important;
                overflow-wrap: break-word !important; /* บังคับตัดคำขึ้นบรรทัดใหม่ ไม่ให้ดันตารางกว้างเกิน */
                padding: 0.6mm 2px !important; /* ลด padding ซ้ายขวาเพื่อประหยัดพื้นที่ */
            }

            /* คลาสสำหรับบังคับขึ้นหน้าใหม่ตอนพิมพ์ (ใช้กับ tbody จะเสถียรกว่า) */
            tbody.page-break-before {
                page-break-before: always !important;
                break-before: page !important;
            }

            .no-print {
                display: none !important;
            }
            .print-only {
                display: block !important;
            }
            .print-full-width {
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                box-shadow: none !important;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                page-break-inside: auto;
            }
            tr {
                page-break-inside: avoid;
                page-break-after: auto;
            }
            thead {
                display: table-header-group; /* ให้หัวตารางแสดงซ้ำในหน้าถัดไป */
            }
            tfoot {
                display: table-footer-group;
            }
            th, td {
                border: 1px solid #000 !important;
                padding: 0.6mm 2px !important; /* ลดความกว้าง padding ซ้ายขวา */
                height: 0.6mm !important;
                line-height: 1 !important;
                font-size: 7pt !important; /* บังคับขนาด 7 ในตาราง */
            }
            #printArea {
                padding-top: 0;
            }
            th {
                background-color: #f3f4f6 !important; 
                -webkit-print-color-adjust: exact;
                font-weight: bold !important; /* หัวข้อตัวหนา */
            }
            td {
                font-weight: normal !important; /* รายละเอียดตัวบาง */
            }
            /* บังคับล้างคลาสตัวหนาของ Tailwind ออกเฉพาะใน td */
            td.font-medium, td.font-semibold, td.font-bold {
                font-weight: normal !important;
            }
            tfoot td {
                background-color: #f3f4f6 !important;
                -webkit-print-color-adjust: exact;
                font-weight: bold !important; /* ยอดรวมล่างสุดขอเป็นตัวหนา */
            }
            
            /* สไตล์เฉพาะสำหรับหัวรายงานที่ 1 */
            .print-title-report1 {
                font-size: 16pt !important;
                font-weight: bold !important;
                text-align: center;
                margin-bottom: 15px;
            }
            /* จัดหน้ากว้างแบบ Fixed กว้างรวม 275mm สำหรับรายงานที่ 1 (15+120+35+35+35+35) */
            .report1-table-print {
                width: 275mm !important; 
                table-layout: fixed;
                margin: 0 auto; 
            }

            /* จัดการ Checkbox ตอนปริ้น */
            input[type="checkbox"] {
                appearance: none;
                -webkit-appearance: none;
                width: 14px;
                height: 14px;
                border: 1px solid #000;
                display: inline-block;
                position: relative;
            }
            input[type="checkbox"]:checked::after {
                content: '✔';
                position: absolute;
                top: -3px;
                left: 2px;
                font-size: 12px;
            }
        }

        /* ตกแต่ง Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>

<body class="h-screen flex flex-col overflow-hidden">

    <!-- History Modal -->
    <div id="historyModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex justify-center items-center no-print">
        <div class="bg-white rounded-lg shadow-xl w-11/12 max-w-lg overflow-hidden flex flex-col max-h-[80vh]">
            <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">

    <script>
        let appData = []; 
        let activeMenu = 1; 
        
        // ตัวแปรสำหรับรายงานที่ 2
        let selectedCategories_forReport2 = []; 
        let currentAvailableCategories2 = []; 
        let report2DropdownOpen = false;

        let selectedCategoryN_forReport3 = "ทั้งหมด"; 
        let selectedCategoryC_forReport4 = ""; 
        let startDate_forReport5 = "";
        let endDate_forReport5 = "";
        let selectedCategoriesM_forReport5 = []; // เพิ่มตัวแปรสำหรับเก็บรายการ คอลัมน์ M สำหรับรายงานที่ 5
        let selectedCompanies_forReport5 = []; // เพิ่มตัวแปรสำหรับเก็บบริษัทแบบเลือกหลายรายการ รายงานที่ 5
        let currentAvailableCompanies5 = []; // เพิ่มตัวแปรเก็บรายการบริษัทที่แสดงใน Dropdown ปัจจุบัน
        let currentAvailableCategories5 = []; // เพิ่มตัวแปรเก็บรายการค่าที่แสดงใน Dropdown ปัจจุบัน
        let report5DropdownOpen = false; // สถานะการเปิด/ปิด dropdown ของค่า
        let report5CompanyDropdownOpen = false; // สถานะการเปิด/ปิด dropdown ของบริษัท
        
        // ตัวแปรสำหรับรายงานที่ 6
        let appData6 = [];
        let historyList6 = [];
        let selectedHistoryUrl6 = "";
        let isLoadingHistory6 = false;
        let isLoadingData6 = false;

        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT-vY0-Ic04efRHyFptGVLR3UCipBUBhJiFSCWl_3RDAbQP6cUdQaz53D_1Sru3rg/pub?output=csv";
        const HISTORY_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMQ_KJlIyAnZJJYKMjKqKWaM226gI8W00KBx7fUBvUFh6JC5RXNL2Ix28rLR7dZA/pub?output=csv";

        // ฟังก์ชันช่วยสกัด URL ออกจากโค้ด iframe แบบอัตโนมัติ
        function extractUrlFromEmbed(str) {
            let url = String(str).trim();
            if (url.toLowerCase().includes('<iframe') && url.includes('src=')) {
                const match = url.match(/src=["'](.*?)["']/);
                if (match && match[1]) {
                    url = match[1];
                }
            }
            // คืนค่า URL ที่เอา entity &amp; ออกแล้วแปลงเป็น & ปกติ (ถ้ามี)
            return url.replace(/&amp;/g, '&');
        }

        const menus = [
            { id: 1, title: "1. แบบรายงานเจ้าหนี้คงเหลือ" },
            { id: 2, title: "2. รายงานเจ้าหนี้แยกประเภท" },
            { id: 3, title: "3. รายงานเจ้าหนี้ ทวนเจ้าหนี้ หน่วยงาน" },
            { id: 4, title: "4. รายงานเจ้าหนี้ ทวนเจ้าหนี้ บริษัท" },
            { id: 5, title: "5. ทะเบียนคุมส่งทำเช็ค" },
            { id: 6, title: "6. รายงานเจ้าหนี้ย้อนหลัง" }
        ];

        function renderMenu() {
            const menuList = document.getElementById('menuList');
            menuList.innerHTML = '';
            
            menus.forEach(menu => {
                const li = document.createElement('li');
                li.className = `px-4 py-3 rounded-lg cursor-pointer transition-colors text-sm font-medium ${
                    activeMenu === menu.id 
                    ? 'bg-blue-100 text-blue-800 border-l-4 border-blue-600' 
                    : 'text-gray-600 hover:bg-gray-100 border-l-4 border-transparent'
                }`;
                li.textContent = menu.title;
                li.onclick = () => {
                    activeMenu = menu.id;
                    renderMenu();
                    renderContent();
                };
                menuList.appendChild(li);
            });
        }

        function updateStatus(isLoaded) {
            const badge = document.getElementById('statusBadge');
            if(isLoaded) {
                badge.className = "text-sm px-3 py-1 rounded-full bg-green-100 text-green-800 font-medium flex items-center gap-2";
                badge.innerHTML = `
                    <span class="relative flex h-3 w-3">
                      <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                    โหลดข้อมูลสำเร็จ
                `;
            } else {
                badge.className = "text-sm px-3 py-1 rounded-full bg-yellow-100 text-yellow-800 font-medium flex items-center gap-2";
                badge.innerHTML = `
                    <span class="relative flex h-3 w-3">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-3 w-3 bg-yellow-500"></span>
                    </span>
                    กำลังโหลด/ยังไม่มีข้อมูล
                `;
            }
        }

        function fetchGoogleSheetData() {
            updateStatus(false);
            const badge = document.getElementById('statusBadge');
            badge.innerHTML = 'กำลังดึงข้อมูล...';

            Papa.parse(GOOGLE_SHEET_CSV_URL, {
                download: true,
                header: false,
                complete: function(results) {
                    processRawData(results.data);
                },
                error: function(err) {
                    console.error(err);
                    alert("ไม่สามารถดึงข้อมูลจาก Google Sheet ได้");
                    updateStatus(false);
                }
            });
        }

        function openHistoryModal() {
            document.getElementById('historyModal').classList.remove('hidden');
            const content = document.getElementById('historyModalContent');
            content.innerHTML = '<div class="text-center text-gray-500 py-8">กำลังโหลดรายการ...</div>';

            Papa.parse(HISTORY_SHEET_CSV_URL, {
                download: true,
                header: false,
                complete: function(results) {
                    renderHistoryList(results.data);
                },
                error: function(err) {
                    console.error(err);
                    content.innerHTML = '<div class="text-center text-red-500 py-8">ไม่สามารถโหลดรายการได้ กรุณาลองใหม่อีกครั้ง</div>';
                }
            });
        }

        function closeHistoryModal() {
            document.getElementById('historyModal').classList.add('hidden');
        }

        function renderHistoryList(data) {
            const content = document.getElementById('historyModalContent');
            content.innerHTML = '';
            
            // ข้ามแถวที่ 1 (Index 0) ไปเลย แล้วดึงตั้งแต่แถวที่ 2 (Index 1) เป็นต้นไป กรองแถวว่างออก
            const validData = data.slice(1).filter(row => row.length >= 2 && row[0] && String(row[0]).trim() !== '');
            
            if (validData.length === 0) {
                content.innerHTML = '<div class="text-center text-gray-500 py-8">ไม่พบรายการข้อมูลย้อนหลัง</div>';
                return;
            }

            const list = document.createElement('ul');
            list.className = 'space-y-2';

            validData.forEach((row) => {
                const name = String(row[0]).trim(); // คอลัมน์ A
                const url = extractUrlFromEmbed(row[1]);  // คอลัมน์ B (รองรับทั้ง URL ปกติ และ iframe)
                
                // ตรวจสอบว่าเป็น URL หรือไม่ (เผื่อข้อมูลแถวนั้นผิดพลาด)
                if(url.startsWith('http')) {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <button onclick="loadHistoricalData('${url}')" class="w-full text-left px-4 py-3 bg-gray-50 hover:bg-blue-50 border border-gray-200 hover:border-blue-300 rounded-lg transition-colors flex justify-between items-center">
                            <span class="font-medium text-gray-800">${name}</span>
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </button>
                    `;
                    list.appendChild(li);
                }
            });
            content.appendChild(list);
        }

        function loadHistoricalData(url) {
            closeHistoryModal();
            updateStatus(false);
            const badge = document.getElementById('statusBadge');
            badge.innerHTML = 'กำลังดึงข้อมูลย้อนหลัง...';

            // แปลง URL รูปแบบ pubhtml ให้เป็น pub?output=csv เพื่อให้อ่านข้อมูลดิบได้ง่ายเหมือนเดิม
            let fetchUrl = url;
            if(fetchUrl.includes('pubhtml')) {
                fetchUrl = fetchUrl.replace('pubhtml', 'pub').split('?')[0] + '?output=csv';
            }

            Papa.parse(fetchUrl, {
                download: true,
                header: false,
                complete: function(results) {
                    processRawData(results.data);
                },
                error: function(err) {
                    console.error(err);
                    alert("ไม่สามารถดึงข้อมูลย้อนหลังจากลิงก์ที่เลือกได้");
                    updateStatus(false);
                }
            });
        }

        function processRawData(data) {
            if(data.length < 5) {
                alert("ข้อมูลมีน้อยกว่า 5 แถว ไม่สามารถแสดงผลได้ตามเงื่อนไข");
                updateStatus(false);
                return;
            }
            
            appData = data.slice(4); 
            
            appData = appData.filter(row => row.length > 0 && row.some(cell => cell !== "" && cell !== null && cell !== undefined));

            updateStatus(true);
            renderContent();
        }

        function parseNumberValue(val) {
            if (!val) return 0;
            if (typeof val === 'string') {
                val = val.replace(/,/g, '');
            }
            const num = parseFloat(val);
            return isNaN(num) ? 0 : num;
        }

        function formatNumber(num) {
            const val = parseFloat(num);
            if (isNaN(val) || val === 0) return '0.00';
            return val.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // เพิ่มตัวแปรเพื่อรองรับการแสดงผลแบบปีแบบย่อ (เช่น 67 แทน 2567)
        function formatThaiDate(dateVal, shortYear = false) {
            if (dateVal === undefined || dateVal === null || dateVal === '') return '-';
            
            let d, m, y;
            if (typeof dateVal === 'number') {
                const excelEpoch = new Date(Date.UTC(1899, 11, 30));
                const dateObj = new Date(excelEpoch.getTime() + dateVal * 86400000);
                d = dateObj.getUTCDate();
                m = dateObj.getUTCMonth() + 1;
                y = dateObj.getUTCFullYear();
                if (y < 2500) y += 543;
            } else {
                let dateStr = String(dateVal).trim();
                const parts = dateStr.split(/[-/]/);
                if (parts.length === 3) {
                    d = parseInt(parts[0]);
                    m = parseInt(parts[1]);
                    y = parseInt(parts[2]);
                    
                    if (parts[0].length === 4) {
                        y = parseInt(parts[0]);
                        m = parseInt(parts[1]);
                        d = parseInt(parts[2]);
                    }

                    if (!isNaN(d) && !isNaN(m) && !isNaN(y)) {
                         if (y < 100) {
                             if (y >= 50) y += 2500; 
                             else y += 2000;
                         }
                         if (y < 2500) y += 543; 
                    } else {
                        return dateStr;
                    }
                } else {
                    return dateStr;
                }
            }
            
            let yearStr = shortYear ? String(y).slice(-2) : String(y);
            return `${String(d).padStart(2, '0')}/${String(m).padStart(2, '0')}/${yearStr}`;
        }

        // ฟังก์ชันช่วยสำหรับการแปลงวันที่เพื่อใช้เปรียบเทียบ
        function getJSDate(dateVal) {
            if (dateVal === undefined || dateVal === null || dateVal === '') return null;
            if (typeof dateVal === 'number') {
                const excelEpoch = new Date(Date.UTC(1899, 11, 30));
                return new Date(excelEpoch.getTime() + dateVal * 86400000);
            }
            let dateStr = String(dateVal).trim();
            const parts = dateStr.split(/[-/]/);
            if (parts.length === 3) {
                let d = parseInt(parts[0]);
                let m = parseInt(parts[1]) - 1;
                let y = parseInt(parts[2]);
                if (parts[0].length === 4) {
                    y = parseInt(parts[0]);
                    m = parseInt(parts[1]) - 1;
                    d = parseInt(parts[2]);
                }
                if (y < 100) {
                    if (y >= 50) y += 2500;
                    else y += 2000;
                }
                if (y > 2400) y -= 543; // แปลงพ.ศ. กลับเป็น ค.ศ. สำหรับ JS Date object
                return new Date(y, m, d);
            }
            const fallback = new Date(dateStr);
            return isNaN(fallback.getTime()) ? null : fallback;
        }

        function formatHTMLDate(yyyy_mm_dd) {
            if(!yyyy_mm_dd) return '';
            const parts = yyyy_mm_dd.split('-');
            if(parts.length !== 3) return yyyy_mm_dd;
            return `${parts[2]}/${parts[1]}/${parseInt(parts[0])+543}`;
        }

        // ฟังก์ชันแปลงรูปแบบ 03/2026 เป็น มีนาคม 2026
        function getThaiMonthYear(mm_yyyy) {
            if (!mm_yyyy || typeof mm_yyyy !== 'string') return mm_yyyy;
            const parts = mm_yyyy.split('/');
            if (parts.length === 2) {
                const monthIndex = parseInt(parts[0], 10) - 1;
                const year = parts[1];
                const thaiMonths = [
                    "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน",
                    "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"
                ];
                if (monthIndex >= 0 && monthIndex < 12) {
                    return `${thaiMonths[monthIndex]} ${year}`;
                }
            }
            return mm_yyyy; // คืนค่าเดิมหากไม่ตรงรูปแบบ
        }

                                                           class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 mr-3">
                                                    <span class="text-sm text-gray-700">${comp}</span>
                                                </label>
                                            `).join('') : '<div class="py-2 text-sm text-gray-500">ไม่พบบริษัทในช่วงที่เลือก</div>'}
                                        </div>
                                    </div>
                                </div>

                                <label class="text-gray-700 font-medium whitespace-nowrap ml-0 sm:ml-2 mt-2 sm:mt-0">ค่า:</label>
                                <div class="relative inline-block text-left w-full sm:w-auto">
                                    <button type="button" id="catDropdownBtn5" onclick="toggleReport5Dropdown()" class="border border-gray-300 rounded-lg px-4 py-2 bg-white text-gray-800 shadow-sm flex items-center justify-between w-full sm:w-64 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                        <span class="truncate">${selectedCategoriesM_forReport5.length > 0 ? selectedCategoriesM_forReport5.join(', ') : '-- เลือกค่าทั้งหมด --'}</span>
                                        <svg class="-mr-1 ml-2 h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                                            <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                                        </svg>
                                    </button>
                                    <div id="catDropdown5" class="${report5DropdownOpen ? '' : 'hidden'} origin-top-right absolute left-0 mt-2 w-full sm:w-64 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 z-20">
                                        <div class="px-3 py-2 border-b border-gray-200 flex justify-between bg-gray-50 sticky top-0 z-10 rounded-t-md">
                                            <button type="button" onclick="selectAllCategories5()" class="text-xs font-semibold text-blue-600 hover:text-blue-800 focus:outline-none">เลือกทั้งหมด</button>
                                            <button type="button" onclick="clearAllCategories5()" class="text-xs font-semibold text-red-600 hover:text-red-800 focus:outline-none">ล้าง</button>
                                        </div>
                                        <div class="py-1 max-h-48 overflow-y-auto px-3" role="menu" aria-orientation="vertical">
                                            ${uniqueCategoriesM.length > 0 ? uniqueCategoriesM.map(cat => `
                                                <label class="flex items-center py-2 cursor-pointer hover:bg-gray-50 border-b border-gray-100 last:border-0">
                                                    <input type="checkbox" value="${cat}" 
                                                           ${selectedCategoriesM_forReport5.includes(cat) ? 'checked' : ''}
                                                           onchange="updateReport5CategoryFilter(this.value, this.checked)"
                                                           class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 mr-3">
                                                    <span class="text-sm text-gray-700">${cat}</span>
                                                </label>
                                            `).join('') : '<div class="py-2 text-sm text-gray-500">ไม่พบค่าในช่วงที่เลือก</div>'}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button onclick="window.print()" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded shadow flex items-center gap-2 transition-colors shrink-0 h-fit">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                            </svg>
                            พิมพ์รายงาน
                        </button>
                    </div>
                </div>
                
                <h3 class="text-xl font-bold text-center mb-4 print-only">${titleText}</h3>
            `;

            let tableHTML = `
                <div class="overflow-x-auto bg-white rounded-lg border border-gray-200 shadow-sm">
                    <table class="min-w-full text-sm text-left whitespace-nowrap print-fixed-table">
                        <thead class="bg-blue-50 text-blue-900 border-b border-gray-200">
                            <tr>
                                <th class="px-4 py-3 font-semibold text-center border-r border-gray-200" style="width: 25mm;">วันที่</th>
                                <th class="px-4 py-3 font-semibold border-r border-gray-200" style="width: 50mm;">บริษัท/หจก/ร้าน</th>
                                <th class="px-4 py-3 font-semibold" style="width: 40mm;">ค่า</th>
                                <th class="px-4 py-3 font-semibold" style="width: 40mm;">ใบส่งของ/แจ้งหนี้</th>
                                <th class="px-4 py-3 font-semibold text-right" style="width: 35mm;">จำนวนเงิน</th>
                            </tr>
                        </thead>
            `;

            let finalFilteredData = compFilteredData;
            if (selectedCategoriesM_forReport5.length > 0) {
                finalFilteredData = finalFilteredData.filter(row => {
                    const rowCat = String(row[12] || '').trim();
                    return selectedCategoriesM_forReport5.includes(rowCat);
                });
            }

            if (finalFilteredData.length === 0) {
                 tableHTML += `<tbody><tr><td colspan="5" class="px-4 py-8 text-center text-gray-500">ไม่พบข้อมูลตามเงื่อนไขที่เลือก</td></tr></tbody>`;
            } else {
                const groupedData = {};
                finalFilteredData.forEach(row => {
                    const e = parseNumberValue(row[4]);
                    if (e === 0) return;

                    let compC = String(row[2] || '').trim();
                    if (compC === '') compC = 'ไม่ระบุบริษัท';

                    const rawDate = row[23];
                    const jsDate = getJSDate(rawDate);
                    const dateSortKey = jsDate ? jsDate.getTime() : 0;
                    const displayDate = formatThaiDate(rawDate, true);

                    if (!groupedData[dateSortKey]) {
                        groupedData[dateSortKey] = {
                            displayDate: displayDate,
                            companies: {},
                            totalRows: 0
                        };
                    }

                    if (!groupedData[dateSortKey].companies[compC]) {
                        groupedData[dateSortKey].companies[compC] = [];
                    }

                    groupedData[dateSortKey].companies[compC].push(row);
                    groupedData[dateSortKey].totalRows++;
                });

                let sumGrandTotalE = 0;
                const dateKeys = Object.keys(groupedData).sort((a, b) => Number(a) - Number(b));

                if (dateKeys.length === 0) {
                    tableHTML += `<tbody><tr><td colspan="5" class="px-4 py-8 text-center text-gray-500">ไม่พบยอดเงินในเงื่อนไขนี้</td></tr></tbody>`;
                } else {
                    tableHTML += `<tbody class="divide-y divide-gray-100">`;

                    dateKeys.forEach((dKey) => {
                        const dateGroup = groupedData[dKey];
                        const cKeys = Object.keys(dateGroup.companies).sort();

                        let isFirstRowOfDate = true;

                        cKeys.forEach((cKey) => {
                            const groupRows = dateGroup.companies[cKey];

                            groupRows.forEach((row, idx) => {
                                const e = parseNumberValue(row[4]);
                                sumGrandTotalE += e;

                                const invD  = row[3] || '-';
                                const valM  = String(row[12] || '').trim() || '-';

                                tableHTML += `<tr class="hover:bg-gray-50 transition-colors">`;
                                
                                if (isFirstRowOfDate) {
                                    tableHTML += `<td rowspan="${dateGroup.totalRows}" class="px-4 py-2 text-center text-gray-800 border-r border-gray-200 align-top bg-white font-medium">${dateGroup.displayDate}</td>`;
                                    isFirstRowOfDate = false;
                                }
                                
                                if (idx === 0) {
                                    tableHTML += `<td rowspan="${groupRows.length}" class="px-4 py-2 font-bold text-gray-800 align-top border-r border-gray-200 bg-white break-words">${cKey}</td>`;
                                }

                                tableHTML += `
                                    <td class="px-4 py-2 text-gray-800 break-words">${valM}</td>
                                    <td class="px-4 py-2 text-gray-800 break-words">${invD}</td>
                                    <td class="px-4 py-2 text-right text-gray-800 font-medium">${formatNumber(e)}</td>
                                </tr>`;
                            });
                        });
                    });

                    tableHTML += `</tbody>`;

                    tableHTML += `
                            <tfoot class="bg-gray-200 border-t-2 border-gray-300 font-bold text-gray-900">
                                <tr>
                                    <td colspan="4" class="px-4 py-3 text-center border-r border-gray-300">รวมยอดเงินทั้งสิ้น</td>
                                    <td class="px-4 py-3 text-right text-blue-900">${formatNumber(sumGrandTotalE)}</td>
                                </tr>
                            </tfoot>
                    `;
                }
            }

            tableHTML += `</table></div>`;
            container.innerHTML = headerHTML + tableHTML;
        }

        // ==========================================
        // รายงานที่ 6: รายงานเจ้าหนี้ย้อนหลัง
        // ==========================================
        function renderReport6(container) {
            // ถ้ายังไม่โหลดรายชื่อให้ดึงข้อมูลก่อน
            if (historyList6.length === 0 && !isLoadingHistory6) {
                isLoadingHistory6 = true;
                container.innerHTML = '<div class="text-center text-gray-500 py-8">กำลังดึงข้อมูลรายชื่อย้อนหลัง...</div>';
                Papa.parse(HISTORY_SHEET_CSV_URL, {
                    download: true,
                    header: false,
                    complete: function(results) {
                        isLoadingHistory6 = false;
                        // ข้ามแถวที่ 1 แล้วกรองข้อมูล
                        const validData = results.data.slice(1).filter(row => row.length >= 2 && row[0] && String(row[0]).trim() !== '');
                        historyList6 = validData.map(row => ({
                            name: String(row[0]).trim(),
                            url: extractUrlFromEmbed(row[1]) // ดึง URL จาก iframe (ถ้ามี)
                        })).filter(item => item.url.startsWith('http'));
                        renderReport6(container);
                    },
                    error: function(err) {
                        isLoadingHistory6 = false;
                        container.innerHTML = '<div class="text-center text-red-500 py-8">ไม่สามารถโหลดรายการได้</div>';
                    }
                });
                return;
            }

            let headerHTML = `
                <div class="flex flex-col mb-6 gap-4 no-print">
                    <h3 class="text-2xl font-bold text-gray-800">6. รายงานเจ้าหนี้ย้อนหลัง</h3>
                    <div class="bg-white p-4 rounded-lg border border-gray-200 shadow-sm w-full flex flex-col sm:flex-row items-start sm:items-center gap-3">
                        <label class="text-gray-700 font-medium whitespace-nowrap">เลือกเดือน:</label>
                        <select onchange="handleHistorySelect6(this.value)" class="border border-gray-300 rounded-lg px-4 py-2 bg-white text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm w-full sm:w-80 cursor-pointer">
                            <option value="">-- กรุณาเลือกข้อมูลย้อนหลัง --</option>
                            ${historyList6.map(h => `<option value="${h.url}" ${selectedHistoryUrl6 === h.url ? 'selected' : ''}>${h.name}</option>`).join('')}
                        </select>
                    </div>
                </div>
            `;

            let contentHTML = '';

            if (isLoadingData6) {
                contentHTML = '<div class="text-center text-blue-500 py-8">กำลังโหลดข้อมูลรายงาน...</div>';
            } else if (appData6.length > 0) {
                // ดึงชื่อของข้อมูลที่กำลังเลือก เพื่อแปลงเป็นชื่อเดือน
                const selectedItem = historyList6.find(h => h.url === selectedHistoryUrl6);
                const selectedName = selectedItem ? selectedItem.name : "";
                const formattedDate = getThaiMonthYear(selectedName);
                const printTitle = `รายงานเจ้าหนี้ เดือน ${formattedDate}`;

                // ประมวลผลแบบเดียวกันกับรายงานที่ 1
                const groupedData = {};
                appData6.forEach(row => {
                    let valM = row[12] || '';
                    valM = String(valM).trim();
                    
                    if (valM === '') {
                        const e = parseNumberValue(row[4]);
                        const f = parseNumberValue(row[5]);
                        const g = parseNumberValue(row[6]);
                        const h = parseNumberValue(row[7]);
                        if(e === 0 && f === 0 && g === 0 && h === 0) return;
                        valM = 'ไม่ระบุหมวดหมู่';
                    }

                    if (!groupedData[valM]) groupedData[valM] = { E: 0, F: 0, G: 0, H: 0 };

                    groupedData[valM].E += parseNumberValue(row[4]);
                    groupedData[valM].F += parseNumberValue(row[5]);
                    groupedData[valM].G += parseNumberValue(row[6]);
                    groupedData[valM].H += parseNumberValue(row[7]);
                });

                contentHTML = `
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-4 gap-4 no-print border-t border-gray-200 pt-6">
                        <h4 class="text-xl font-bold text-gray-700">6.1 แบบรายงานเจ้าหน้า เดือนเก่า</h4>
                        <button onclick="window.print()" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded shadow flex items-center gap-2 transition-colors shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                            </svg>
                            พิมพ์รายงาน
                        </button>
                    </div>
                    
                    <div class="print-only font-bold text-center" style="font-size: 7pt !important; margin-bottom: 15px;">${printTitle}</div>
                    
                    <div class="overflow-x-auto bg-white rounded-lg border border-gray-200 shadow-sm flex justify-center">
                        <table class="w-full text-sm text-left report1-table-print" style="table-layout: fixed;">
                            <thead class="bg-blue-50 text-blue-900 border-b border-gray-200">
                                <tr>
                                    <th class="px-4 py-3 font-semibold text-center" style="width: 15mm;">ลำดับ</th>
                                    <th class="px-4 py-3 font-semibold" style="width: 120mm;">ค่า</th>
                                    <th class="px-4 py-3 font-semibold text-right" style="width: 35mm;">จำนวนเงิน</th>
                                    <th class="px-4 py-3 font-semibold text-right" style="width: 35mm;">จ่าย</th>
                                    <th class="px-4 py-3 font-semibold text-right" style="width: 35mm;">ปรับปรุง</th>
                                    <th class="px-4 py-3 font-semibold text-right" style="width: 35mm;">คงเหลือ</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                `;

                let index = 1;
                let sumE = 0, sumF = 0, sumG = 0, sumH = 0;
                const keys = Object.keys(groupedData).sort(); 

                if (keys.length === 0) {
                    contentHTML += `<tr><td colspan="6" class="px-4 py-8 text-center text-gray-500">ไม่พบข้อมูลในตาราง</td></tr>`;
                } else {
                    keys.forEach(key => {
                        const data = groupedData[key];
                        sumE += data.E; sumF += data.F; sumG += data.G; sumH += data.H;

                        contentHTML += `
                            <tr class="hover:bg-gray-50 transition-colors">
                                <td class="px-4 py-2 text-center text-gray-500">${index++}</td>
                                <td class="px-4 py-2 text-gray-800 font-medium">${key}</td>
                                <td class="px-4 py-2 text-right text-gray-800">${formatNumber(data.E)}</td>
                                <td class="px-4 py-2 text-right text-gray-800">${formatNumber(data.F)}</td>
                                <td class="px-4 py-2 text-right text-gray-800">${formatNumber(data.G)}</td>
                                <td class="px-4 py-2 text-right text-blue-700 font-semibold">${formatNumber(data.H)}</td>
                            </tr>
                        `;
                    });

                    contentHTML += `
                            </tbody>
                            <tfoot class="bg-gray-100 border-t-2 border-gray-300 font-bold">
                                <tr>
                                    <td colspan="2" class="px-4 py-3 text-center text-gray-800">รวมทั้งสิ้น</td>
                                    <td class="px-4 py-3 text-right text-gray-900">${formatNumber(sumE)}</td>
                                    <td class="px-4 py-3 text-right text-gray-900">${formatNumber(sumF)}</td>
                                    <td class="px-4 py-3 text-right text-gray-900">${formatNumber(sumG)}</td>
                                    <td class="px-4 py-3 text-right text-blue-800">${formatNumber(sumH)}</td>
                                </tr>
                            </tfoot>
                    `;
                }
                contentHTML += `</table></div>`;
            } else if (selectedHistoryUrl6 !== "") {
                contentHTML = '<div class="text-center text-gray-500 py-8">ไม่พบข้อมูล หรือข้อมูลไม่ถูกต้อง</div>';
            } else {
                contentHTML = `
                    <div class="text-center text-gray-400 mt-10 no-print border-t border-gray-200 pt-10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-4 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                        </svg>
                        <p class="text-lg">กรุณาเลือกข้อมูลย้อนหลังจากดรอปดาวน์ด้านบน</p>
                    </div>
                `;
            }

            container.innerHTML = headerHTML + contentHTML;
        }

        // ฟังก์ชันโหลดข้อมูลย่อย เมื่อเปลี่ยนดรอปดาวน์ในเมนู 6
        function handleHistorySelect6(url) {
            selectedHistoryUrl6 = url;
            if (!url) {
                appData6 = [];
                renderReport6(document.getElementById('contentContainer'));
                return;
            }

            isLoadingData6 = true;
            renderReport6(document.getElementById('contentContainer'));

            // แปลง URL รูปแบบ pubhtml ให้เป็น pub?output=csv เพื่อให้อ่านข้อมูลดิบได้
            let fetchUrl = url;
            if(fetchUrl.includes('pubhtml')) {
                fetchUrl = fetchUrl.replace('pubhtml', 'pub').split('?')[0] + '?output=csv';
            }

            Papa.parse(fetchUrl, {
                download: true,
                header: false,
                complete: function(results) {
                    isLoadingData6 = false;
                    if(results.data && results.data.length >= 5) {
                        appData6 = results.data.slice(4).filter(row => row.length > 0 && row.some(cell => cell !== "" && cell !== null && cell !== undefined));
                    } else {
                        appData6 = [];
                    }
                    renderReport6(document.getElementById('contentContainer'));
                },
                error: function(err) {
                    console.error(err);
                    isLoadingData6 = false;
                    appData6 = [];
                    alert("ไม่สามารถดึงข้อมูลย้อนหลังจากลิงก์ที่เลือกได้");
                    renderReport6(document.getElementById('contentContainer'));
                }
            });
        }

        function renderPlaceholder(container) {
            const menuTitle = menus.find(m => m.id === activeMenu).title;
            container.innerHTML = `
                <div class="flex justify-between items-end mb-6 no-print">
                    <h3 class="text-2xl font-bold text-gray-800">${menuTitle}</h3>
                </div>
                <div class="bg-white p-8 rounded-lg border border-gray-200 text-center text-gray-500">
                    ยังไม่มีการกำหนดรูปแบบการแสดงผลสำหรับรายงานนี้
                </div>
            `;
        }

        renderMenu();
        fetchGoogleSheetData(); // โหลดข้อมูลอัตโนมัติเมื่อเปิดหน้าเว็บ

    </script>
