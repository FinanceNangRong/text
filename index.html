<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบรายงานเจ้าหนี้คงเหลือ</title>
    <!-- Tailwind CSS สำหรับตกแต่งหน้าเว็บ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse สำหรับอ่านไฟล์ CSV จาก Google Sheet -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- SheetJS สำหรับ Export Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- ฟอนต์ Noto Sans Thai -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html {
            font-size: 100%; 
        }
        body {
            font-family: 'Noto Sans Thai', sans-serif;
            background-color: #f3f4f6;
        }
        
        .print-only {
            display: none;
        }

        /* ตั้งค่าสำหรับการพิมพ์เฉพาะหน้า 1 */
        @media print {
            @page {
                size: A4 landscape;
                margin: 10mm;
            }
            body, html {
                background-color: white;
                height: auto !important;
                overflow: visible !important;
                display: block !important;
            }
            .h-screen, .overflow-hidden, .overflow-auto, main, #printArea, #contentContainer {
                height: auto !important;
                overflow: visible !important;
                display: block !important;
                position: static !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            .shadow-sm, .shadow-md, .shadow { box-shadow: none !important; }
            .rounded-lg { border-radius: 0 !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            
            table {
                width: 100%;
                border-collapse: collapse;
            }
            th, td {
                border: 1px solid #000 !important;
                padding: 0.5mm 2px !important;
                line-height: 1.5 !important;
                font-size: 6pt !important;
            }
            th {
                background-color: #f3f4f6 !important; 
                -webkit-print-color-adjust: exact;
                font-weight: bold !important;
            }
            tfoot td {
                background-color: #f3f4f6 !important;
                -webkit-print-color-adjust: exact;
                font-weight: bold !important;
            }
            
            /* สไตล์เฉพาะสำหรับหัวรายงานที่ 1 */
            .print-title-report1 {
                font-size: 6pt !important;
                font-weight: bold !important;
                text-align: center;
                margin-bottom: 6px;
            }
            /* จัดหน้ากว้างแบบ Fixed กว้างรวม 251mm สำหรับรายงานที่ 1 */
            .report1-table-print {
                width: 251mm !important; 
                table-layout: fixed;
                margin: 0 auto; 
            }
            .print-truncate {
                white-space: nowrap !important;
                overflow: hidden !important;
                text-overflow: ellipsis !important;
            }
        }

        /* ตกแต่ง Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- แถบด้านบน -->
    <header class="bg-blue-800 text-white p-4 shadow-md no-print shrink-0 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <a href="https://financenangrong.github.io/financial-system/" class="text-white hover:bg-blue-700 focus:outline-none p-2 rounded transition-colors flex items-center gap-1" title="ย้อนกลับ">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                <span class="hidden sm:inline font-medium text-sm">ย้อนกลับ</span>
            </a>
            <img src="https://github.com/FinanceNangRong/financial-system/raw/main/NRHOS.png" alt="NRHOS Logo" class="h-8 w-auto bg-white rounded-sm p-0.5">
            <h1 class="text-2xl font-bold">1. แบบรายงานเจ้าหนี้คงเหลือ</h1>
        </div>
        <div id="statusBadge" class="text-sm px-3 py-1 rounded-full bg-yellow-100 text-yellow-800 font-medium flex items-center gap-2">
            <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-yellow-500"></span>
            </span>
            กำลังโหลดข้อมูล...
        </div>
    </header>

    <!-- ช่องแสดงผล -->
    <main class="flex-1 bg-white overflow-auto p-4 sm:p-6" id="printArea">
        <div id="contentContainer" class="w-full h-full mx-auto">
            <div class="text-center text-gray-400 mt-20 no-print">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-4 text-gray-300 animate-spin" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                <p class="text-lg">กำลังโหลดข้อมูลอัตโนมัติ กรุณารอสักครู่...</p>
            </div>
        </div>
    </main>

    <script>
        let appData = []; 
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT-vY0-Ic04efRHyFptGVLR3UCipBUBhJiFSCWl_3RDAbQP6cUdQaz53D_1Sru3rg/pub?output=csv";

        // ฟังก์ชันอัปเดตสถานะการโหลดข้อมูล
        function updateStatus(isSuccess) {
            const statusBadge = document.getElementById('statusBadge');
            if (!statusBadge) return;
            
            if (isSuccess) {
                statusBadge.className = "text-sm px-3 py-1 rounded-full bg-emerald-100 text-emerald-800 font-medium flex items-center gap-2";
                statusBadge.innerHTML = `
                    <span class="relative flex h-3 w-3">
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                    </span>
                    ข้อมูลพร้อมใช้งาน
                `;
            } else {
                statusBadge.className = "text-sm px-3 py-1 rounded-full bg-red-100 text-red-800 font-medium flex items-center gap-2";
                statusBadge.innerHTML = `
                    <span class="relative flex h-3 w-3">
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                    </span>
                    โหลดข้อมูลล้มเหลว
                `;
            }
        }

        function parseNumberValue(val) {
            if (!val) return 0;
            if (typeof val === 'string') {
                val = val.replace(/,/g, '');
            }
            const num = parseFloat(val);
            return isNaN(num) ? 0 : num;
        }

        function formatNumber(num) {
            const val = parseFloat(num);
            if (isNaN(val) || val === 0) return '0.00';
            return val.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // ฟังก์ชันเตรียมข้อมูลดิบ (คงฟังก์ชันนี้ไว้ทั้งหมดเพื่อความสมบูรณ์ของโครงสร้างข้อมูลแม้จะใช้ไม่ครบในหน้านี้)
        function enrichData(rows) {
            return rows.map(row => {
                row._e = parseNumberValue(row[4]);
                row._f = parseNumberValue(row[5]);
                row._g = parseNumberValue(row[6]);
                row._h = parseNumberValue(row[7]);
                
                let valM = String(row[12] || '').trim();
                row._valM = valM === '' ? 'ไม่ระบุหมวดหมู่' : valM;

                return row;
            });
        }

        function processRawData(data) {
            if(data.length < 5) {
                alert("ข้อมูลมีน้อยกว่า 5 แถว ไม่สามารถแสดงผลได้");
                updateStatus(false);
                return;
            }
            
            let rawRows = data.slice(4).filter(row => row.length > 0 && row.some(cell => cell !== "" && cell !== null && cell !== undefined));
            appData = enrichData(rawRows);

            updateStatus(true);
            renderReport1(document.getElementById('contentContainer'));
        }

        // ฟังก์ชันดึงข้อมูลจาก Google Sheet
        function fetchGoogleSheetData() {
            Papa.parse(GOOGLE_SHEET_CSV_URL, {
                download: true,
                header: false,
                complete: function(results) {
                    processRawData(results.data);
                },
                error: function(err) {
                    console.error("Error fetching data:", err);
                    updateStatus(false);
                    document.getElementById('contentContainer').innerHTML = `<div class="text-center text-red-500 mt-20 no-print"><p class="text-xl">ไม่สามารถโหลดข้อมูลได้ โปรดตรวจสอบการเชื่อมต่ออินเทอร์เน็ต</p></div>`;
                }
            });
        }

        // ==========================================
        // รายงานที่ 1: แบบรายงานเจ้าหนี้คงเหลือ
        // ==========================================
        function renderReport1(container) {
            if (appData.length === 0) return;

            const groupedData = {};
            
            // ประมวลผลและจัดกลุ่มข้อมูลตามหมวดหมู่
            appData.forEach(row => {
                let valM = row._valM;
                
                if (valM === 'ไม่ระบุหมวดหมู่') {
                     if(row._e === 0 && row._f === 0 && row._g === 0 && row._h === 0) return;
                }

                if (!groupedData[valM]) {
                    groupedData[valM] = { E: 0, F: 0, G: 0, H: 0 };
                }

                groupedData[valM].E += row._e;
                groupedData[valM].F += row._f;
                groupedData[valM].G += row._g;
                groupedData[valM].H += row._h;
            });

            // สร้างส่วนหัว HTML
            let headerHTML = `
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 gap-4 no-print">
                    <h3 class="text-2xl font-bold text-gray-800">แบบรายงานเจ้าหนี้คงเหลือ</h3>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <button onclick="exportExcel()" class="flex-1 sm:flex-none bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded shadow flex items-center justify-center gap-2 transition-colors shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                            </svg>
                            ส่งออก Excel
                        </button>
                        <button onclick="window.print()" class="flex-1 sm:flex-none bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded shadow flex items-center justify-center gap-2 transition-colors shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                            </svg>
                            พิมพ์รายงาน
                        </button>
                    </div>
                </div>
            `;

            // สร้างส่วนตาราง HTML
            let tableHTML = `
                <div class="overflow-x-auto bg-white rounded-lg border border-gray-200 shadow-sm">
                    <table class="w-full text-sm text-left report1-table-print">
                        <thead class="bg-blue-50 text-blue-900 border-b border-gray-200">
                            <tr>
                                <th class="px-4 py-3 font-semibold text-center w-16">ลำดับ</th>
                                <th class="px-4 py-3 font-semibold text-center min-w-[250px] w-auto">ค่า</th>
                                <th class="px-4 py-3 font-semibold text-center w-32 sm:w-40">จำนวนเงิน</th>
                                <th class="px-4 py-3 font-semibold text-center w-32 sm:w-40">จ่าย</th>
                                <th class="px-4 py-3 font-semibold text-center w-32 sm:w-40">ปรับปรุง</th>
                                <th class="px-4 py-3 font-semibold text-center w-32 sm:w-40">คงเหลือ</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
            `;

            let index = 1;
            let sumE = 0, sumF = 0, sumG = 0, sumH = 0;
            const keys = Object.keys(groupedData).sort(); 

            if (keys.length === 0) {
                tableHTML += `<tr><td colspan="6" class="px-4 py-8 text-center text-gray-500">ไม่พบข้อมูลในตาราง</td></tr>`;
            } else {
                keys.forEach(key => {
                    const data = groupedData[key];
                    sumE += data.E; sumF += data.F; sumG += data.G; sumH += data.H;

                    tableHTML += `
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="px-4 py-2 text-center text-gray-500">${index++}</td>
                            <td class="px-4 py-2 text-gray-800 font-medium truncate max-w-[200px] sm:max-w-[300px] md:max-w-[400px] lg:max-w-[500px] print-truncate" title="${key}">${key}</td>
                            <td class="px-4 py-2 text-right text-gray-800">${formatNumber(data.E)}</td>
                            <td class="px-4 py-2 text-right text-gray-800">${formatNumber(data.F)}</td>
                            <td class="px-4 py-2 text-right text-gray-800">${formatNumber(data.G)}</td>
                            <td class="px-4 py-2 text-right text-blue-700 font-semibold">${formatNumber(data.H)}</td>
                        </tr>
                    `;
                });

                tableHTML += `
                        </tbody>
                        <tfoot class="bg-gray-100 border-t-2 border-gray-300 font-bold">
                            <tr>
                                <td colspan="2" class="px-4 py-3 text-center text-gray-800">รวมทั้งสิ้น</td>
                                <td class="px-4 py-3 text-right text-gray-900">${formatNumber(sumE)}</td>
                                <td class="px-4 py-3 text-right text-gray-900">${formatNumber(sumF)}</td>
                                <td class="px-4 py-3 text-right text-gray-900">${formatNumber(sumG)}</td>
                                <td class="px-4 py-3 text-right text-blue-800">${formatNumber(sumH)}</td>
                            </tr>
                        </tfoot>
                `;
            }

            tableHTML += `
                    </table>
                </div>
            `;

            container.innerHTML = headerHTML + tableHTML;
        }

        // ฟังก์ชันสำหรับส่งออกข้อมูลเป็น Excel
        function exportExcel() {
            if (appData.length === 0) {
                alert("ไม่มีข้อมูลสำหรับส่งออก");
                return;
            }

            const groupedData = {};
            
            // ประมวลผลข้อมูล
            appData.forEach(row => {
                let valM = row._valM;
                if (valM === 'ไม่ระบุหมวดหมู่') {
                     if(row._e === 0 && row._f === 0 && row._g === 0 && row._h === 0) return;
                }
                if (!groupedData[valM]) groupedData[valM] = { E: 0, F: 0, G: 0, H: 0 };
                groupedData[valM].E += row._e;
                groupedData[valM].F += row._f;
                groupedData[valM].G += row._g;
                groupedData[valM].H += row._h;
            });

            // สร้าง Array สำหรับข้อมูล Excel
            const ws_data = [
                ["ลำดับ", "ค่า", "จำนวนเงิน", "จ่าย", "ปรับปรุง", "คงเหลือ"]
            ];

            let index = 1;
            let sumE = 0, sumF = 0, sumG = 0, sumH = 0;
            const keys = Object.keys(groupedData).sort(); 

            keys.forEach(key => {
                const data = groupedData[key];
                sumE += data.E; sumF += data.F; sumG += data.G; sumH += data.H;
                ws_data.push([
                    index++, 
                    key, 
                    data.E, 
                    data.F, 
                    data.G, 
                    data.H
                ]);
            });

            // แถวสรุปยอดรวม
            ws_data.push([
                "รวมทั้งสิ้น", 
                "", 
                sumE, 
                sumF, 
                sumG, 
                sumH
            ]);

            // สร้างและบันทึกไฟล์ Excel
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(ws_data);
            XLSX.utils.book_append_sheet(wb, ws, "เจ้าหนี้คงเหลือ");
            XLSX.writeFile(wb, "รายงานเจ้าหนี้คงเหลือ.xlsx");
        }

        // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
        document.addEventListener('DOMContentLoaded', fetchGoogleSheetData);
    </script>
</body>
</html>
